<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>班級 RPG — 公會大廳</title>
<style>
  :root{
    --bg:#161b28; --panel:#212940; --panel2:#2a3350; --line:#3a4568;
    --ink:#e8ecf7; --dim:#9aa5c4;
    --gold:#f0b429; --gold-dim:#a87f1f;
    --parch:#e8d5a3; --hp:#e05252; --xp:#4f8fe0; --ok:#5cc47a;
    --legend:#ff9c40;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:"Microsoft JhengHei","PingFang TC",sans-serif;min-height:100vh}
  .num{font-family:"Consolas","Courier New",monospace}
  header{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:2px solid var(--line);background:var(--panel);position:sticky;top:0;z-index:10;flex-wrap:wrap}
  header h1{font-size:16px;letter-spacing:2px;color:var(--parch)}
  header .tag{font-size:11px;color:var(--gold);border:1px solid var(--gold-dim);padding:2px 8px;border-radius:3px}
  header .sp{flex:1}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:6px;font-size:13px}
  .btn{background:var(--panel2);color:var(--ink);border:1px solid var(--line);padding:7px 14px;transition:background .15s}
  .btn:hover{background:#343f63}
  .btn.gold{background:var(--gold);color:#2a2004;font-weight:bold;border-color:var(--gold)}
  .btn.gold:hover{background:#ffc94d}
  .btn.danger{color:#ffb3b3;border-color:#7a3a3a}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  main{max-width:1180px;margin:0 auto;padding:14px}

  /* 首頁 */
  .home{display:flex;flex-direction:column;align-items:center;gap:20px;padding:40px 12px;text-align:center}
  .home .crest{font-size:52px}
  .home h2{color:var(--parch);letter-spacing:4px;font-size:24px}
  .home p{color:var(--dim);font-size:13px;max-width:460px;line-height:1.7}
  .role-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;width:100%;max-width:640px}
  .role-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 8px;color:var(--ink);display:flex;flex-direction:column;gap:5px;align-items:center;transition:transform .12s,border-color .12s}
  .role-card:hover{transform:translateY(-2px);border-color:var(--gold)}
  .role-card .nm{font-size:14px}
  .role-card .sub{font-size:11px;color:var(--dim)}
  .role-card.teacher{grid-column:1/-1;background:linear-gradient(135deg,#2c2a1c,#212940);border-color:var(--gold-dim);padding:16px}
  .role-card.teacher .face{font-size:34px}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:14px}
  .panel h3{font-size:14px;color:var(--parch);letter-spacing:2px;margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .panel h3::before{content:"◆";color:var(--gold);font-size:10px}
  .panel h3 .hsp{flex:1}

  /* 班級目標 */
  .goal-wrap{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .goal-bar{flex:1;min-width:180px;background:#141927;border-radius:10px;height:22px;overflow:hidden;border:1px solid #10141f;position:relative}
  .goal-bar>i{display:block;height:100%;background:linear-gradient(90deg,#4f8fe0,#7db2ff);transition:width .5s}
  .goal-bar span{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;text-shadow:0 1px 2px #000}
  .goal-done .goal-bar>i{background:linear-gradient(90deg,var(--gold),#ffd970)}
  .boss-bar>i{background:linear-gradient(90deg,#7a2424,#e05252)}

  /* 觸控大屏:分組牆 */
  .board-toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .group-wall{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
  .group-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px;display:flex;flex-direction:column;gap:8px}
  .group-head{display:flex;align-items:center;gap:8px}
  .group-head .gname{font-size:16px;color:var(--parch);letter-spacing:1px}
  .group-head .gscore{font-size:12px;color:var(--dim)}
  .group-head .hsp{flex:1}
  .gaward{background:var(--gold);color:#2a2004;font-weight:bold;padding:8px 12px;border-radius:8px;font-size:13px}
  .gaward:active{transform:scale(.96)}
  .member-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:8px}
  .member{background:#1b2136;border:1px solid var(--line);border-radius:10px;padding:8px 4px 6px;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;transition:transform .1s,border-color .1s;-webkit-tap-highlight-color:transparent}
  .member:active{transform:scale(.94);border-color:var(--gold)}
  .member .mname{font-size:12px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .member .mlv{font-size:10px;color:var(--gold)}
  .member .mbadges{font-size:10px;min-height:12px}

  /* 加分彈窗(觸控大按鈕) */
  .overlay{position:fixed;inset:0;background:rgba(10,13,22,.7);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}
  .modal{background:var(--panel);border:1px solid var(--gold-dim);border-radius:16px;padding:20px;width:100%;max-width:440px;text-align:center;animation:pop .18s}
  .modal h4{color:var(--parch);font-size:18px;margin-bottom:4px}
  .modal .msub{color:var(--dim);font-size:12px;margin-bottom:14px}
  .big-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
  .big-btn{padding:20px 8px;font-size:17px;border-radius:12px;background:var(--panel2);color:var(--ink);border:1px solid var(--line)}
  .big-btn:active{transform:scale(.95);border-color:var(--gold)}
  .big-btn small{display:block;font-size:11px;color:var(--dim);margin-top:4px}
  .modal .custom{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:12px}
  input,select{background:#181e30;border:1px solid var(--line);color:var(--ink);border-radius:6px;padding:8px 10px;font-size:14px;font-family:inherit}
  input:focus,select:focus{outline:none;border-color:var(--gold)}
  input[type=number]{width:88px}

  /* 浮動回饋 */
  .float-fx{position:fixed;z-index:60;pointer-events:none;font-weight:bold;font-size:20px;text-shadow:0 2px 6px #000;animation:floatUp 1.1s ease-out forwards}
  @keyframes floatUp{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(-70px) scale(1.3)}}
  .lvup-fx{position:fixed;inset:0;z-index:55;display:flex;align-items:center;justify-content:center;pointer-events:none}
  .lvup-fx .txt{font-size:44px;color:var(--gold);text-shadow:0 0 24px rgba(240,180,41,.8),0 3px 6px #000;letter-spacing:6px;animation:lvpop 1.6s ease-out forwards}
  @keyframes lvpop{0%{opacity:0;transform:scale(.4)}25%{opacity:1;transform:scale(1.15)}45%{transform:scale(1)}80%{opacity:1}100%{opacity:0;transform:scale(1.05)}}

  /* 名冊管理 */
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{color:var(--dim);font-weight:normal;text-align:left;padding:6px 8px;border-bottom:1px solid var(--line);font-size:12px}
  td{padding:7px 8px;border-bottom:1px solid #2a3350;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  .mini{font-size:11px;color:var(--dim)}
  .inline-form{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

  /* 學生端 */
  .stu-layout{display:grid;grid-template-columns:300px 1fr;gap:14px}
  @media (max-width:780px){.stu-layout{grid-template-columns:1fr}}
  .char-card{background:linear-gradient(160deg,#262f4c,#1d2338);border:1px solid var(--line);border-radius:12px;padding:16px;text-align:center}
  .char-card .cname{font-size:18px;color:var(--parch);margin-top:4px}
  .char-card .cjob{font-size:12px;color:var(--dim)}
  .lv-badge{display:inline-block;background:var(--gold);color:#2a2004;font-weight:bold;border-radius:4px;padding:2px 8px;font-size:12px;margin-top:6px}
  .bar{background:#141927;border-radius:6px;height:14px;overflow:hidden;margin-top:4px;border:1px solid #10141f}
  .bar>i{display:block;height:100%;transition:width .3s}
  .bar-label{display:flex;justify-content:space-between;font-size:11px;color:var(--dim);margin-top:10px}
  .gold-line{margin-top:12px;font-size:15px;color:var(--gold)}
  .equip-slots{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:12px}
  .slot{background:#181e30;border:1px dashed var(--line);border-radius:8px;padding:8px 4px;font-size:11px;color:var(--dim);min-height:58px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
  .slot.filled{border-style:solid;border-color:var(--gold-dim);color:var(--ink)}
  .stat-strip{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;justify-content:center}
  .stat-chip{background:#181e30;border:1px solid var(--line);border-radius:14px;padding:4px 10px;font-size:12px}
  .stat-legend{font-size:11px;color:var(--dim);line-height:1.8;margin-top:8px;text-align:left}
  .badge-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:10px}
  .badge{font-size:11px;background:#1b2136;border:1px solid var(--gold-dim);color:var(--parch);border-radius:12px;padding:3px 9px}
  .badge.locked{border-color:var(--line);color:#5a648a}
  .wheel-outer{position:relative;width:280px;height:280px;margin:8px auto 0}
  .wheel-pointer{position:absolute;top:-8px;left:50%;transform:translateX(-50%);font-size:24px;color:var(--gold);z-index:2;text-shadow:0 2px 4px #000}
  .wheel{width:280px;height:280px;border-radius:50%;border:5px solid var(--gold-dim);position:relative;transition:transform 3.1s cubic-bezier(.12,.85,.22,1);box-shadow:0 0 24px rgba(0,0,0,.5) inset}
  .wseg{position:absolute;top:50%;left:50%;width:84px;margin:-12px 0 0 -42px;font-size:11px;color:var(--ink);text-align:center;line-height:1.2;pointer-events:none}
  .wheel-hub{position:absolute;top:50%;left:50%;width:44px;height:44px;margin:-22px 0 0 -22px;border-radius:50%;background:var(--panel);border:3px solid var(--gold);z-index:1;display:flex;align-items:center;justify-content:center;font-size:18px}
  .rar.Custom{color:#7ad0e8}
  .px-wrap{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start}
  .px-grid{display:grid;grid-template-columns:repeat(16,1fr);gap:1px;background:#10141f;border:1px solid var(--line);border-radius:6px;padding:3px;width:100%;max-width:340px;touch-action:none;user-select:none}
  .px-cell{aspect-ratio:1;background:#232b42;border:none;border-radius:2px;padding:0;min-width:0}
  .palette{display:flex;gap:5px;flex-wrap:wrap;align-items:center;max-width:340px}
  input[type=color].swatch{min-height:32px;height:32px;width:38px;border:2px solid var(--line);border-radius:6px;background:#181e30;cursor:pointer}
  .swatch{width:30px;height:30px;border-radius:6px;border:2px solid transparent;padding:0;font-size:14px;color:#9aa5c4}
  .swatch.on{border-color:#fff}

  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .tab{background:var(--panel2);border:1px solid var(--line);color:var(--dim);padding:6px 14px;border-radius:16px;font-size:13px}
  .tab.on{background:var(--gold);color:#2a2004;font-weight:bold;border-color:var(--gold)}
  .shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .item-card{background:#1b2136;border:1px solid var(--line);border-radius:10px;padding:10px;display:flex;flex-direction:column;gap:5px;font-size:12px}
  .item-card.equipped{border-color:var(--ok);box-shadow:0 0 0 1px var(--ok)}
  .item-card .iic{font-size:26px;text-align:center}
  .item-card .inm{text-align:center;font-size:13px}
  .item-card .rar{text-align:center;font-size:10px}
  .rar.Common{color:var(--dim)} .rar.Legendary{color:var(--legend)}
  .item-card .istats{color:var(--dim);font-size:11px;text-align:center;min-height:14px}
  .price{color:var(--gold);text-align:center}
  .log-list{list-style:none;font-size:12px;color:var(--dim);max-height:240px;overflow:auto}
  .log-list li{padding:5px 2px;border-bottom:1px dashed #2a3350;line-height:1.5}
  .lb-rank{font-size:15px;color:var(--gold);width:34px;display:inline-block}
  .toast-wrap{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:8px;z-index:99}
  .toast{background:var(--panel2);border:1px solid var(--gold-dim);color:var(--ink);padding:10px 18px;border-radius:8px;font-size:13px;box-shadow:0 4px 16px rgba(0,0,0,.5);animation:pop .2s}
  .toast.err{border-color:var(--hp);color:#ffc9c9}
  @keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  /* ── v8 全域打磨 ── */
  *{-webkit-tap-highlight-color:transparent}
  .btn,.tab{min-height:38px}
  .tab{padding:8px 16px}
  .chip-btn{background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:3px 8px;font-size:12px;cursor:pointer}
  .btn:active,.tab:active,.chip-btn:active{transform:scale(.96)}
  .panel{box-shadow:0 2px 12px rgba(0,0,0,.22)}
  input,select{min-height:38px;font-size:15px}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:#3a4568;border-radius:4px}
  ::-webkit-scrollbar-track{background:transparent}
  .toast{max-width:88vw}
  .item-card .btn{min-height:34px}
  @media (max-width:560px){
    header{padding:8px 10px} header h1{font-size:15px}
    main{padding:10px}
    .big-btn{padding:16px 6px;font-size:15px}
    .member-grid{grid-template-columns:repeat(auto-fill,minmax(78px,1fr))}
  }

.cast-banner{position:sticky;top:0;z-index:50;background:linear-gradient(90deg,#8a1f1a,#c0392b,#8a1f1a);color:#ffe08a;font-weight:800;text-align:center;padding:12px;border-radius:10px;margin-bottom:10px;box-shadow:0 4px 18px rgba(192,57,43,.6);animation:castflash 1s ease-in-out infinite}
@keyframes castflash{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.55;transform:scale(1.01)}}
.member.downed{opacity:.7}
.comic-pop{position:fixed;left:50%;top:36%;transform:translate(-50%,-50%);z-index:120;pointer-events:none;--cp:#f5c518;background:#fff;border:4px solid #141414;padding:18px 26px;animation:cpop 1.1s ease-out forwards;box-shadow:3px 3px 0 rgba(0,0,0,.85)}
.comic-pop.cp-anchored{top:auto;left:auto;transform:translate(-50%,-100%);padding:6px 12px;border-width:3px;animation:cpanchor .9s ease-out forwards;box-shadow:2px 2px 0 rgba(0,0,0,.85)}
.comic-pop.cp-anchored span{font-size:17px}
@keyframes cpanchor{0%{opacity:0;transform:translate(-50%,-70%) scale(.5)}18%{opacity:1;transform:translate(-50%,-100%) scale(1.15)}30%{transform:translate(-50%,-100%) scale(1)}75%{opacity:1;transform:translate(-50%,-115%) scale(1)}100%{opacity:0;transform:translate(-50%,-150%) scale(.9)}}
.comic-pop span{font-family:"Comic Sans MS","Noto Sans TC",sans-serif;font-weight:900;font-size:32px;color:var(--cp);-webkit-text-stroke:1.5px #141414;letter-spacing:1px;white-space:nowrap}
.cp-boom{clip-path:polygon(0% 20%,8% 12%,14% 22%,22% 4%,32% 18%,42% 2%,52% 16%,62% 0%,72% 16%,82% 3%,90% 18%,100% 10%,94% 30%,100% 46%,90% 54%,100% 70%,88% 76%,96% 92%,80% 84%,72% 100%,60% 84%,50% 98%,40% 84%,30% 100%,20% 84%,8% 92%,14% 74%,2% 66%,10% 50%,0% 38%);padding:34px 44px}
.cp-cloud{border-radius:50% 50% 50% 50%/60% 60% 40% 40%}
.cp-spike{clip-path:polygon(0 35%,15% 30%,10% 12%,30% 22%,35% 0,50% 18%,68% 4%,68% 24%,90% 18%,82% 36%,100% 40%,85% 55%,98% 72%,78% 70%,82% 92%,62% 80%,52% 100%,42% 80%,24% 94%,24% 72%,4% 76%,14% 56%,0 52%);padding:30px 40px}
@keyframes cpop{0%{opacity:0;transform:translate(-50%,-50%) scale(.3) rotate(-8deg)}15%{opacity:1;transform:translate(-50%,-50%) scale(1.14) rotate(2deg)}28%{transform:translate(-50%,-50%) scale(1) rotate(-1deg)}82%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0)}100%{opacity:0;transform:translate(-50%,-56%) scale(.92)}}

/* ═══════════ 漫畫風皮膚(COMIC SKIN)═══════════ */
:root{ --toon-ink:#141414; --toon-paper:#fdf7ea; --toon-shadow:rgba(0,0,0,.85); }
body{ background:radial-gradient(circle,rgba(0,0,0,.07) 1.5px,transparent 1.6px) 0 0/13px 13px, #e9edf3 !important; color:var(--toon-ink) !important; }
header{ background:var(--toon-ink) !important; border-bottom:4px solid var(--toon-ink) !important; }
header h1{ color:#fff !important; -webkit-text-stroke:.4px #000; }
header .tag{ color:#141414 !important; background:var(--gold); border:2px solid #141414 !important; border-radius:4px; font-weight:900; }
/* 卡片=漫畫格 */
.panel,.role-card,.group-card,.hero-card{ background:var(--toon-paper) !important; border:4px solid var(--toon-ink) !important; border-radius:8px !important; box-shadow:5px 5px 0 var(--toon-shadow) !important; color:var(--toon-ink) !important; }
.panel h3{ color:#141414 !important; font-weight:900; letter-spacing:.5px; background:var(--gold); display:inline-flex !important; padding:4px 14px; border:3px solid #141414; border-radius:5px; transform:rotate(-1deg); box-shadow:3px 3px 0 var(--toon-shadow); }
.panel h3::before{ content:"" !important; }
.panel h3 .hsp{ display:none; }
/* 按鈕放大+粗黑框+立體 */
.btn{ background:#fff !important; color:#141414 !important; border:3px solid #141414 !important; border-radius:8px !important; padding:11px 20px !important; font-size:15px !important; font-weight:900 !important; box-shadow:4px 4px 0 var(--toon-shadow) !important; transition:transform .05s,box-shadow .05s !important; }
.btn:hover{ background:#fff8e6 !important; }
.btn:active{ transform:translate(4px,4px) !important; box-shadow:0 0 0 var(--toon-shadow) !important; }
.btn.gold{ background:var(--gold) !important; color:#141414 !important; }
.btn.danger{ background:var(--hp) !important; color:#fff !important; border-color:#141414 !important; }
.btn:disabled{ opacity:.45 !important; box-shadow:2px 2px 0 var(--toon-shadow) !important; }
.tab{ border:3px solid #141414 !important; border-radius:8px !important; font-weight:900 !important; padding:9px 15px !important; background:#fff !important; color:#141414 !important; box-shadow:3px 3px 0 var(--toon-shadow) !important; }
.tab.on{ background:var(--gold) !important; }
/* 血條/進度條=粗框 */
.goal-bar,.boss-bar,.hpbar{ border:3px solid #141414 !important; background:#fff !important; border-radius:6px !important; }
.goal-bar span{ color:#141414 !important; text-shadow:none !important; font-weight:900; }
.boss-bar>i{ background:repeating-linear-gradient(45deg,#e23b3b,#e23b3b 10px,#c0392b 10px,#c0392b 20px) !important; }
.stat-chip{ background:#fff !important; border:2px solid #141414 !important; border-radius:20px !important; color:#141414 !important; font-weight:700; padding:3px 10px !important; }
.mini{ color:#5a5a5a !important; }
/* 分組色塊網點 */
.group-card{ background:radial-gradient(circle,rgba(0,0,0,.06) 1.4px,transparent 1.5px) 0 0/10px 10px, var(--toon-paper) !important; }
.member{ background:#fff !important; border:3px solid #141414 !important; border-radius:8px !important; box-shadow:3px 3px 0 var(--toon-shadow) !important; }
.role-card.teacher{ background:var(--gold) !important; }
/* 對話框=漫畫框 */
.overlay .modal{ background:var(--toon-paper) !important; border:4px solid #141414 !important; border-radius:10px !important; box-shadow:8px 8px 0 var(--toon-shadow) !important; color:#141414 !important; }
.overlay .modal h3,.overlay .modal h4{ color:#141414 !important; }
table th{ background:#141414 !important; color:#fff !important; }
table td{ border-bottom:2px solid #e0d8c4 !important; }
/* 學生角色卡:左右裝備佈局 */
.char-card{ background:radial-gradient(circle,rgba(0,0,0,.06) 1.4px,transparent 1.5px) 0 0/11px 11px, var(--toon-paper) !important; border:4px solid #141414 !important; border-radius:12px !important; box-shadow:5px 5px 0 var(--toon-shadow) !important; padding:14px !important; }
.char-equip-row{ display:flex; align-items:center; justify-content:center; gap:6px; padding-top:12px; }
.char-center{ display:flex; flex-direction:column; align-items:center; flex:0 0 auto; overflow:visible; }
.char-center svg{ display:block; }
.stat-line-row{ display:flex; justify-content:center; gap:6px; margin-top:12px; flex-wrap:wrap; }
.stat-pill{ background:#fff; border:2.5px solid #141414; border-radius:16px; padding:3px 11px; font-weight:900; color:#141414; box-shadow:2px 2px 0 var(--toon-shadow); font-size:12px; }

function rollTier(){
  const total = BP_TIERS.reduce((a,t)=>a+t.w, 0);
  let r = Math.random()*total;
  for(const t of BP_TIERS){ r -= t.w; if(r<=0) return t.key; }
  return "common";
}

  const q = key.split(":");
  const ti = tierInfo(q[1]||"common");
  const af = q[2] ? affixInfo(q[2]) : null;
  return ti.icon+ti.name+"・"+TYPE_NAME[q[0]] + (af?" ["+af.icon+af.name+"]":"");

function scalePixels(pixels, f, gw, gh){
  const out = {}; const cx = (gw-1)/2, cy = (gh-1)/2;
  for(let y=0;y<gh;y++) for(let x=0;x<gw;x++){
    const sx = Math.round((x-cx)/f + cx), sy = Math.round((y-cy)/f + cy);
    const c = pixels[sx+","+sy];
    if(c) out[x+","+y] = c;
  }
  return out;
}

  const out = {}; let dropped = 0;
  for(const k in pixels){
    const q = k.split(","); 
    if(+q[0]>=0 && +q[0]<gw && +q[1]>=0 && +q[1]<gh) out[k] = pixels[k];
    else dropped++;
  }
  return {pixels:out, dropped};
}

function customPixelsSVG(pixels, R, gw, gh){
  if(!R || !pixels) return "";
  const cw = R.w/gw, ch = R.h/gh;
  const bleed = Math.min(cw, ch) * 0.08;
  let out = '<g shape-rendering="crispEdges">';
  for(const k in pixels){
    const c = pixels[k]; if(!c) continue;
    const p = k.split(",");
    out += '<rect x="'+(R.x+(+p[0])*cw-bleed)+'" y="'+(R.y+(+p[1])*ch-bleed)
      +'" width="'+(cw+bleed*2)+'" height="'+(ch+bleed*2)+'" fill="'+c+'"/>';
  }
  return out + '</g>';
}

    return '<svg viewBox="0 0 100 100" width="'+size+'" height="'+size+'" aria-hidden="true">'
      + toonDefs()
      + o.pre + TOON_OPEN + '<g'+tr+'><image href="'+i.img+'" x="0" y="0" width="100" height="100" preserveAspectRatio="xMidYMid meet"/></g>' + TOON_CLOSE + o.post + '</svg>';
  }
  const gw = i.gw || i.grid || 12, gh = i.gh || i.grid || 12;
  const R = {x:0, y:0, w:gw, h:gh};
  const o = fxOverlaySVG(i.fx, R, i.pixels);
  const body = (i.smooth ? customPixelsSmoothSVG : customPixelsSVG)(i.pixels, R, gw, gh);
  return '<svg viewBox="-0.5 -0.5 '+(gw+1)+' '+(gh+1)+'" width="'+Math.round(size*gw/gh<size?size*gw/gh:size)+'" height="'+size+'" aria-hidden="true">'
    + toonDefs()
    + o.pre + TOON_OPEN + body + TOON_CLOSE + o.post + '</svg>';
}
function slotArt(s, slot, override){
  if(override && override.type===slot) return customArt(override, slot);

/* ── 創作特效(SVG 原生動畫,離線可用)────────────── */
function avgPixelColor(pixels){
  let r=0,g=0,b=0,n=0;
  for(const k in (pixels||{})){
    const c = pixels[k];
    if(/^#[0-9a-fA-F]{6}$/.test(c)){
      r+=parseInt(c.slice(1,3),16); g+=parseInt(c.slice(3,5),16); b+=parseInt(c.slice(5,7),16); n++;
    }
  }
  if(!n) return "#ffe08a";
  const h=v=>("0"+Math.round(v/n).toString(16)).slice(-2);
  return "#"+h(r)+h(g)+h(b);
}
function fxOverlaySVG(fx, R, pixels){
  if(!fx || fx==="none" || !R) return {pre:"", post:""};
  if(fx==="glow"){
    const c = avgPixelColor(pixels);
    const cx=R.x+R.w/2, cy=R.y+R.h/2;
    return { pre:
      '<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+(R.w*0.68)+'" ry="'+(R.h*0.68)+'" fill="'+c+'">'
      + '<animate attributeName="opacity" values="0.12;0.4;0.12" dur="2s" repeatCount="indefinite"/></ellipse>', post:"" };
  }
  if(fx==="both"){
    const g = fxOverlaySVG("glow", R, pixels);
    const sp = fxOverlaySVG("sparkle", R, pixels);
    return {pre:g.pre, post:sp.post};
  }
  if(fx==="sparkle"){
    const spots=[[0.24,0.3],[0.72,0.46],[0.46,0.76]];
    let out="";
    spots.forEach((sp,i)=>{
      const cx=R.x+R.w*sp[0], cy=R.y+R.h*sp[1], s=Math.max(2.4, R.w*0.12);
      out += '<path d="M '+cx+' '+(cy-s)+' L '+(cx+s*0.28)+' '+(cy-s*0.28)+' L '+(cx+s)+' '+cy
        + ' L '+(cx+s*0.28)+' '+(cy+s*0.28)+' L '+cx+' '+(cy+s)+' L '+(cx-s*0.28)+' '+(cy+s*0.28)
        + ' L '+(cx-s)+' '+cy+' L '+(cx-s*0.28)+' '+(cy-s*0.28)+' Z" fill="#ffffff" opacity="0">'
        + '<animate attributeName="opacity" values="0;1;0" dur="1.6s" begin="'+(i*0.55)+'s" repeatCount="indefinite"/></path>';
    });
    return {pre:"", post:out};
  }
  return {pre:"", post:""};
}
/* ── 平滑渲染:暴露角轉圓角 + 同色斜階補過渡(類 Scale2x)── */
function customPixelsSmoothSVG(pixels, R, gw, gh){
  if(!R || !pixels) return "";
  const cw = R.w/gw, ch = R.h/gh;
  const has = (x,y)=> pixels[x+","+y] !== undefined;
  const same = (x,y,c)=> pixels[x+","+y] === c;
  const r = Math.min(cw,ch)*0.5, b = Math.min(cw,ch)*0.08;
  let out = '<g>';
  for(const k in pixels){
    const c = pixels[k]; if(!c) continue;
    const q = k.split(","); const x = +q[0], y = +q[1];
    const L = has(x-1,y), Rt = has(x+1,y), U = has(x,y-1), D = has(x,y+1);
    const x0 = R.x+x*cw-(L?b:0), x1 = R.x+(x+1)*cw+(Rt?b:0);
    const y0 = R.y+y*ch-(U?b:0), y1 = R.y+(y+1)*ch+(D?b:0);
    const rtl = (!L&&!U)?r:0, rtr = (!Rt&&!U)?r:0, rbr = (!Rt&&!D)?r:0, rbl = (!L&&!D)?r:0;
    out += '<path d="M '+(x0+rtl)+' '+y0
      + ' L '+(x1-rtr)+' '+y0 + (rtr ? ' Q '+x1+' '+y0+' '+x1+' '+(y0+rtr) : ' L '+x1+' '+y0)
      + ' L '+x1+' '+(y1-rbr) + (rbr ? ' Q '+x1+' '+y1+' '+(x1-rbr)+' '+y1 : ' L '+x1+' '+y1)
      + ' L '+(x0+rbl)+' '+y1 + (rbl ? ' Q '+x0+' '+y1+' '+x0+' '+(y1-rbl) : ' L '+x0+' '+y1)
      + ' L '+x0+' '+(y0+rtl) + (rtl ? ' Q '+x0+' '+y0+' '+(x0+rtl)+' '+y0 : '')
      + ' Z" fill="'+c+'"/>';
    if(same(x+1,y+1,c) && !Rt && !D){
      const cx = R.x+(x+1)*cw, cy = R.y+(y+1)*ch, sr = r*0.9;
      out += '<path d="M '+(cx-sr)+' '+cy+' Q '+cx+' '+cy+' '+cx+' '+(cy+sr)
        + ' L '+(cx+sr)+' '+cy+' Q '+cx+' '+cy+' '+cx+' '+(cy-sr)+' Z" fill="'+c+'"/>';
    }
    if(same(x+1,y-1,c) && !Rt && !U){
      const cx = R.x+(x+1)*cw, cy = R.y+y*ch, sr = r*0.9;
      out += '<path d="M '+(cx-sr)+' '+cy+' Q '+cx+' '+cy+' '+cx+' '+(cy-sr)
        + ' L '+(cx+sr)+' '+cy+' Q '+cx+' '+cy+' '+cx+' '+(cy+sr)+' Z" fill="'+c+'"/>';
    }
  }
  return out+'</g>';
}
/* ── 設計交換格式(讓 GPT/Gemini 用文字網格幫學生畫圖)──
 * 格式:16 行 × 16 字元;「.」=透明,其餘字元依圖例對應色碼。
 * 解析器高度容錯:忽略說明文字、允許字元間空格、可用「X=#RRGGBB」自訂色。 */
const LEGEND_KEYS = "WEHIKQRFJOYLGDVCBNPMSTAU";   // 依序對應 PALETTE 24 色
const LEGEND_ZH = ["白","亮灰","灰","深灰","墨黑","純黑","紅","暗紅","酒紅","橘","金黃","淡黃",
  "綠","深綠","青綠","天青","藍","深藍","紫","粉","膚","棕膚","棕","深棕"];
function stdLegend(){
  const m = {};
  for(let i=0;i<LEGEND_KEYS.length && i<PALETTE.length;i++) m[LEGEND_KEYS[i]] = PALETTE[i];
  return m;
}
function normHex(c){
  if(/^#[0-9a-fA-F]{3}$/.test(c)) return ("#"+c[1]+c[1]+c[2]+c[2]+c[3]+c[3]).toLowerCase();
  return c.toLowerCase();
}
function designToText(type, pixels){
  const gw = gridW(type), gh = gridH(type);
  const colors = [...new Set(Object.values(pixels).map(normHex))];
  const std = stdLegend();
  const rev = {}; for(const k in std) rev[std[k].toLowerCase()] = k;
  const legend = {}; let extraIdx = 0;
  const charOf = {};
  const EXTRA = "abcdefghijklmnopqrstuvwxyz";
  for(const c of colors){
    let ch = rev[c.toLowerCase()];
    if(!ch){ ch = EXTRA[extraIdx++] || "?"; }
    charOf[c] = ch; legend[ch] = c;
  }
  let rows = [];
  for(let y=0;y<gh;y++){
    let row = "";
    for(let x=0;x<gw;x++){ const c = pixels[x+","+y]; row += c ? charOf[normHex(c)] : "."; }
    rows.push(row);
  }
  return "部位:"+TYPE_NAME[type]+"\n尺寸:"+gw+"x"+gh+"\n圖例:. =透明 "
    + Object.entries(legend).map(([ch,c])=>ch+"="+c).join(" ")
    + "\n" + rows.join("\n");
}
function textToDesign(text, type){
  if(!text) return {ok:false, msg:"沒有內容"};
  const gw = gridW(type), gh = gridH(type);
  const legend = stdLegend();
  for(const m of text.matchAll(/(\S)\s*=\s*[^#\n]{0,12}(#(?:[0-9a-fA-F]{6}|[0-9a-fA-F]{3}))(?![0-9a-fA-F])/g)){
    if(m[1] !== ".") legend[m[1]] = normHex(m[2]);
  }
  const rows = [];
  for(const raw of text.split(/\r?\n/)){
    const line = raw.replace(/[\s,|]/g, "");
    if(line.length === gw && !line.includes("=") && !/[:：]/.test(line)) rows.push(line);
    if(rows.length === gh) break;
  }
  if(rows.length < gh) return {ok:false, msg:TYPE_NAME[type]+"需要 "+gh+" 行 × 每行 "+gw+" 字元的網格(目前找到 "+rows.length+" 行)"};
  const pixels = {}; let unknown = 0, filled = 0;
  for(let y=0;y<gh;y++) for(let x=0;x<gw;x++){
    const ch = rows[y][x];
    if(ch === "." || ch === "0") continue;
    const c = legend[ch];
    if(c){ pixels[x+","+y] = c; filled++; }
    else unknown++;
  }
  if(filled < 5) return {ok:false, msg:"有效像素太少("+filled+" 格),請確認圖例字元"};
  return {ok:true, pixels, unknown, filled};
}

/* 圖片變換:位移→繞區域中心旋轉→繞中心縮放;限幅防失控 */
function clampImgT(t){
  return {
    x: Math.max(-40, Math.min(40, t.x||0)),
    y: Math.max(-40, Math.min(40, t.y||0)),
    s: Math.max(0.3, Math.min(3, t.s||1)),
    r: ((t.r||0) % 360),
  };
}
function imgTransform(t0, cx, cy){
  const t = clampImgT(t0||{});
  if(!t.x && !t.y && t.s===1 && !t.r) return "";
  return ' transform="translate('+t.x+' '+t.y+') rotate('+t.r+' '+cx+' '+cy+') translate('+cx+' '+cy+') scale('+t.s+') translate('+(-cx)+' '+(-cy)+')"';
}
function customArt(itemLike, slot, regions){
  const R0 = (regions || CUSTOM_REGION)[slot];
  if(!R0) return "";
  const gw = itemLike.gw || itemLike.grid || 12;
  const gh = itemLike.gh || itemLike.grid || 12;
  if(itemLike.img){
    const o = fxOverlaySVG(itemLike.fx, R0, itemLike.pixels);
    const tr = imgTransform(itemLike.imgT, R0.x+R0.w/2, R0.y+R0.h/2);
    return o.pre
      + '<g'+tr+'><image href="'+itemLike.img+'" x="'+R0.x+'" y="'+R0.y+'" width="'+R0.w+'" height="'+R0.h+'" preserveAspectRatio="xMidYMid meet"/></g>'
      + o.post;
  }
  const cell = Math.min(R0.w/gw, R0.h/gh);          // 等比:格子必為正方
  const R = { x: R0.x+(R0.w-cell*gw)/2, y: R0.y+(R0.h-cell*gh)/2, w: cell*gw, h: cell*gh };
  const px = (itemLike.smooth ? customPixelsSmoothSVG : customPixelsSVG)(itemLike.pixels, R, gw, gh);
  const o = fxOverlaySVG(itemLike.fx, R, itemLike.pixels);
  return o.pre + px + o.post;
}

/* ── 編輯器歷史(上一步/下一步)─────────────────── */
function edSnapshot(ed){
  ed.undo = ed.undo || []; ed.redo = [];

  if(ed.undo.length > 30) ed.undo.shift();
}
function edUndo(ed){
  if(!ed.undo || !ed.undo.length) return false;
  (ed.redo = ed.redo || []).push(JSON.stringify(ed.pixels));
  ed.pixels = JSON.parse(ed.undo.pop());
  return true;
}
/* 畫布平移:超出邊界的像素裁掉(呼叫端先快照,可用上一步反悔) */
function shiftPixels(pixels, dx, dy, gw, gh){
  const W = gw || GRID, H = gh || GRID;
  const out = {}; let dropped = 0;
  for(const k in pixels){
    const q = k.split(","); const x = +q[0]+dx, y = +q[1]+dy;
    if(x>=0 && x<W && y>=0 && y<H) out[x+","+y] = pixels[k];
    else dropped++;
  }
  return {pixels:out, dropped};
}
function edRedo(ed){
  if(!ed.redo || !ed.redo.length) return false;
  (ed.undo = ed.undo || []).push(JSON.stringify(ed.pixels));
  ed.pixels = JSON.parse(ed.redo.pop());
  return true;
}

      '<path d="M31.5 25 Q32.5 8 50 7 Q67.5 8 68.5 25 L64.5 18.5 L62 26 L58 17.5 L55 25.5 L50 16.5 L45 25.5 L42 17.5 L38 26 L35.5 18.5 Z" fill="#c85a32" stroke="#8f3a1f" stroke-width="1.1"/>'
      + '<path d="M39 12.5 Q45 9.5 51 10.5" stroke="#ef8a55" stroke-width="2" fill="none" stroke-linecap="round"/>'

    + hat + weapon

    + '</svg>';
}

/* ── B 方案漫畫濾鏡(描邊+鮮豔)──────────────────
 * toonDefs():濾鏡定義(每個 SVG 放一次);toonOpen/toonClose:包裹圖層內容。 */
function toonDefs(){ return ""; }   /* 改用 CSS filter,不需 SVG defs */
/* 四方向 drop-shadow 疊出黑色描邊 + 飽和對比;純 CSS 不靠 id,避免同頁多角色衝突 */
const TOON_STYLE = 'filter:saturate(1.4) contrast(1.15) '
  + 'drop-shadow(0.8px 0 0 #141414) drop-shadow(-0.8px 0 0 #141414) '
  + 'drop-shadow(0 0.8px 0 #141414) drop-shadow(0 -0.8px 0 #141414);';
const TOON_OPEN = '<g style="'+TOON_STYLE+'">';
const TOON_CLOSE = '</g>';

function dollSVG(s, size, override){
  if(s.roStyle) return dollRO(s, size, override);
  const bodyC = JOB_BODY_COLOR[s.job] || "#888";
  const back = slotArt(s, "back", override);
  const clothes = slotArt(s, "clothes", override);
  const shoes = slotArt(s, "shoes", override);
  const customEyes = slotArt(s, "eyes", override);
  const brows = slotArt(s, "brows", override);
  const nose = slotArt(s, "nose", override);
  const hat = slotArt(s, "hat", override);
  const weapon = slotArt(s, "weapon", override);
  const eyes = customEyes
    || '<circle cx="45" cy="37" r="1.8" fill="#3a3128"/><circle cx="55" cy="37" r="1.8" fill="#3a3128"/>';
  return '<svg viewBox="0 -20 100 122" width="'+size+'" height="'+Math.round(size*1.22)+'" aria-hidden="true">'
    + toonDefs()
    + '<ellipse cx="50" cy="90" rx="24" ry="6" fill="rgba(0,0,0,.35)"/>'
    + TOON_OPEN
    + back                                                                               // 背飾(最底)
    + '<rect x="36" y="50" width="28" height="32" rx="8" fill="'+bodyC+'"/>'          // 身體
    + '<path d="M 35 38 A 15 15 0 0 1 65 38 C 65 45.5 59 51.5 50 54.5 C 41 51.5 35 45.5 35 38 Z" fill="#f0cfa8"/>'                                // 頭
    + clothes + shoes
    + eyes + brows + nose
    + '<path d="M45 43 Q50 46 55 43" stroke="#3a3128" stroke-width="1.4" fill="none"/>'
    + slotArt(s, "hair", override)
    + hat + weapon
    + TOON_CLOSE
    + '</svg>';
}

/* ── 狀態 ─────────────────────────────────────────── */
function newStudent(id, name, job, group){
  return { id, name, job, group,
    level:1, xp:0, totalXp:0, gold:100, spPoints:0,
    maxHp:100, currentHp:100,
    baseAtk:10, baseAgi:10, baseInt:10, baseDef:10,
    hatId:null, clothesId:null, weaponId:null,
    backId:null, shoesId:null, hairId:null, eyesId:null, browsId:null, noseId:null,
    blueprints:{},
    readDate:null, spinDate:null, spinCount:0,
    skills:{},
    consumables:{}, achievements:[] };
}
function freshState(){
  const st = {
    groups:["A","B","C"],
    students:[],
    log:[],
    classGoal:{target:2000, progress:0, celebrated:false},
    nextIdNum:7,
    tasks:[], submissions:[], nextTaskId:1, boss:null,
    customItems:[], nextItemId:1000,
    announcements:[], nextAnnId:1, goldBurned:0,
    art:{}, skillsOff:false,
  };
  const seed = [
    ["T01","測試戰士","Warrior","A",500,1],["T02","測試法師","Mage","A",500,1],
    ["T03","測試遊俠","Rogue","B",500,1],["T04","測試牧師","Cleric","B",500,1],
    ["T05","測試富翁","Warrior","C",9999,5],["T06","測試新手","Mage","C",0,1],
  ];
  for(const [id,name,job,g,gold,lv] of seed){
    const s = newStudent(id,name,job,g); s.gold=gold; s.level=lv;
    st.students.push(s);
  }
  /* 美編示範:測試戰士使用 RO 風紙娃娃並穿上展示套裝 */
  st.students.forEach(x=>{ x.blueprints["hair:common"] = 1; });   // 更新禮:普通髮型圖紙×1
  ["T01","T02","T03","T04"].forEach(id=>{               // 四職業展示:開 RO 風並升到三轉
    const d = st.students.find(x=>x.id===id);
    if(d && RO_TIER[d.job]){ d.roStyle = true; d.level = 30; d.spPoints = 20; }   // 測試帳號給滿SP試技能
  });
  const demo = st.students.find(x=>x.id==="T01");
  if(demo){
    demo.hatId=7; demo.clothesId=8; demo.weaponId=9; demo.backId=18; demo.shoesId=16;
    BP_TYPES.forEach(t=> BP_TIERS.forEach(ti=>{ demo.blueprints[bpKey(t,ti.key)] = 2; }));   // 測試帳號:各部位×各品級2張
  }
  return st;
}
function migrateV1(v1){
  const st = freshState(); st.students = [];
  const groups = new Set();
  for(const o of v1.students){
    const s = newStudent(o.id, o.name, o.job, o.group || "A");
    Object.assign(s, {
      level:o.level, xp:o.xp, gold:o.gold, spPoints:o.spPoints||0,
      maxHp:o.maxHp||100, currentHp:o.currentHp||100,
      baseAtk:o.baseAtk, baseAgi:o.baseAgi, baseInt:o.baseInt, baseDef:o.baseDef,
      hatId:o.hatId||null, clothesId:o.clothesId||null, weaponId:o.weaponId||null,
      consumables:o.consumables||{},
    });
    groups.add(s.group);
    st.students.push(s);
  }
  if(groups.size) st.groups = [...groups].sort();
  st.log = v1.log || [];
  return st;
}
function backfill(p){
  p.tasks = Array.isArray(p.tasks) ? p.tasks : [];
  p.submissions = Array.isArray(p.submissions) ? p.submissions : [];
  p.nextTaskId = p.nextTaskId || 1;
  p.boss = p.boss || null;
  p.customItems = Array.isArray(p.customItems) ? p.customItems : [];
  p.nextItemId = p.nextItemId || 1000;
  p.announcements = Array.isArray(p.announcements) ? p.announcements : [];
  p.nextAnnId = p.nextAnnId || 1;
  p.goldBurned = p.goldBurned || 0;
  p.art = p.art || {};
  if(p.skillsOff===undefined) p.skillsOff = false;
  if(!p.teacherEmails) p.teacherEmails = [];
  if(p.lbOptIn===undefined) p.lbOptIn = false;
  if(p.lbName===undefined) p.lbName = "";
  if(p.className===undefined) p.className = "";
  if(p.bossKills===undefined) p.bossKills = 0;
  if(!p.xpWeek) p.xpWeek = {key:"", sum:0};
  p.students.forEach((s,i)=>{
    if(s.seat===undefined) s.seat = String(i+1);      // 座號預設依名冊順序
    if(s.email===undefined) s.email = "";
    if(s.birth===undefined) s.birth = "";
  });
  if(p.boss){                                // 相容:進行中的 Boss 補上 v30 新欄位
    if(!p.boss.standby) p.boss.standby = {};
    if(!p.boss.groupBuffs) p.boss.groupBuffs = {};
    if(p.boss.atkBonus===undefined) p.boss.atkBonus = 0;
    if(p.boss.casting===undefined) p.boss.casting = false;
    if(p.boss.counterHalf===undefined) p.boss.counterHalf = false;
    if(p.boss.frozen===undefined) p.boss.frozen = false;
    if(p.boss.poison===undefined) p.boss.poison = null;
    if(!p.boss.revivedThisFight) p.boss.revivedThisFight = {};
  }
  p.students.forEach(s=>{
    if(!s.skills) s.skills = {};
    if(!s.blueprints) s.blueprints = {};
    for(const k of Object.keys(s.blueprints)){          /* v23 以前:純部位鍵 → 遷移為普通級 */
      if(!k.includes(":")){ s.blueprints[k+":common"] = (s.blueprints[k+":common"]||0) + s.blueprints[k]; delete s.blueprints[k]; }
    }
    for(const slot of ALL_SLOTS){ if(s[slot+"Id"]===undefined) s[slot+"Id"] = null; }
    if(s.spinCount===undefined){ s.spinCount = 0; s.spinDate = null; s.readDate = null; }
    if(!s.hairGift){ s.hairGift = true; s.blueprints["hair:common"] = (s.blueprints["hair:common"]||0) + 1; }
    if(s.id==="T01" && !s.t01BpGift2){
      s.t01BpGift2 = true;
      BP_TYPES.forEach(t=> BP_TIERS.forEach(ti=>{
        const k = bpKey(t, ti.key);
        s.blueprints[k] = Math.max(s.blueprints[k]||0, 2);
      }));
    }
    if(s.id==="T01" && (s.roArtDemo || s.pixelDemo)){
      /* 清理 v12/v13 實驗殘留:清空匯入美術、回復向量展示裝 */
      delete s.roArtDemo; delete s.pixelDemo;
      if(!s.clothesId) s.clothesId = 8;
      if(!s.shoesId) s.shoesId = 16;
      p.art = {};
    }
    if(["T02","T03","T04"].includes(s.id) && !s.roLineDemo && RO_TIER[s.job]){
      s.roLineDemo = true; s.roStyle = true; if(s.level<30) s.level = 30;
    }
    if(s.id==="T01" && !s.roStyle){
      s.roStyle = true;
      if(!s.hatId) s.hatId = 7;
      if(!s.clothesId) s.clothesId = 8;
      if(!s.weaponId) s.weaponId = 9;
      if(!s.backId) s.backId = 18;
      if(!s.shoesId) s.shoesId = 16;
    }
  });
  return p;
}
let state = load();
function load(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){ const p = JSON.parse(raw); if(p && Array.isArray(p.students)) return backfill(p); }
    const old = localStorage.getItem(OLD_KEY);
    if(old){ const p = JSON.parse(old); if(p && Array.isArray(p.students)){ const m = migrateV1(p); localStorage.setItem(LS_KEY, JSON.stringify(m)); return m; } }
  }catch(e){ /* 壞資料 → 重建 */ }
  const s = freshState(); localStorage.setItem(LS_KEY, JSON.stringify(s)); return s;
}
function save(){
  localStorage.setItem(LS_KEY, JSON.stringify(state));   // 本機永遠留一份(離線保險)
  CLOUD.scheduleSync();                                   // 雲端節流同步(未連線時自動略過)
}

/* ══ CLOUD:Firestore 雲端資料層(階段2) ══════════════
 * 結構:classes/{cid}/data/main(班級主體,不含學生與作品)
 *       classes/{cid}/students/{sid}(每生一文件,縮小衝突面)
 *       classes/{cid}/items/{itemId}(工坊作品,含圖片)
 *       leaderboard/{cid}(世界排行榜公開摘要)
 * 同步:save() 後節流 1.5s;dirty-check 只寫有變動的文件。 */
const CLOUD = {
  cid: null,              // 目前班級 id(null=未連雲,純本機)
  role: null,             // teacher|student|parent
  _timer: null,
  _lastSnap: {},          // 上次寫入的 JSON 快照(dirty-check 用)
  _unsubs: [],
  _applying: false,       // 正在套用遠端資料(避免回寫迴圈)

  on(){ return FB.ready && FB.db && this.cid; },

  /* 班級主體 = state 去掉 students/customItems */
  _meta(){
    const m = Object.assign({}, state);
    delete m.students; delete m.customItems;
    return m;
  },
  scheduleSync(){
    if(!this.on() || this._applying) return;
    clearTimeout(this._timer);
    this._timer = setTimeout(()=> this.pushDirty().catch(e=>console.warn("sync",e)), 1500);
  },
  async pushDirty(){
    if(!this.on()) return;
    const c = FB.db.collection("classes").doc(this.cid);
    const batchWrites = [];
    const metaJson = JSON.stringify(this._meta());
    if(this._lastSnap.meta !== metaJson){
      batchWrites.push(c.collection("data").doc("main").set(JSON.parse(metaJson)));
      this._lastSnap.meta = metaJson;
    }
    for(const s of state.students){
      const j = JSON.stringify(s);
      if(this._lastSnap["stu:"+s.id] !== j){
        batchWrites.push(c.collection("students").doc(s.id).set(JSON.parse(j)));
        this._lastSnap["stu:"+s.id] = j;
      }
    }
    for(const it of state.customItems){
      const j = JSON.stringify(it);
      if(this._lastSnap["item:"+it.id] !== j){
        batchWrites.push(c.collection("items").doc(String(it.id)).set(JSON.parse(j)));
        this._lastSnap["item:"+it.id] = j;
      }
    }
    await Promise.all(batchWrites);
    this.pushLeaderboard();                    // 排行榜摘要(內部再節流)
  },
  /* 讀整班(進班時一次)+ 掛即時監聽 */
  async loadClass(cid){
    const c = FB.db.collection("classes").doc(cid);
    const [metaDoc, stuSnap, itemSnap] = await Promise.all([
      c.collection("data").doc("main").get(),
      c.collection("students").get(),
      c.collection("items").get()
    ]);
    if(!metaDoc.exists) throw new Error("找不到班級資料");
    const meta = metaDoc.data();
    meta.students = stuSnap.docs.map(d=>d.data());
    meta.customItems = itemSnap.docs.map(d=>d.data());
    state = backfill(meta);
    this.cid = cid;
    localStorage.setItem("rpg-last-class", cid);
    this._snapAll();
    localStorage.setItem(LS_KEY, JSON.stringify(state));   // 雲端資料也落一份本機
    this.listen();
  },
  _snapAll(){
    this._lastSnap = { meta: JSON.stringify(this._meta()) };
    state.students.forEach(s=> this._lastSnap["stu:"+s.id] = JSON.stringify(s));
    state.customItems.forEach(it=> this._lastSnap["item:"+it.id] = JSON.stringify(it));
  },
  /* 即時監聽:別的裝置(老師/其他學生)改了資料,這裡自動更新畫面 */
  listen(){
    this.stopListen();
    const c = FB.db.collection("classes").doc(this.cid);
    const apply = (fn)=>{ this._applying = true; try{ fn(); render(); }finally{ this._applying = false; } };
    this._unsubs.push(c.collection("students").onSnapshot(snap=>{
      snap.docChanges().forEach(ch=>{
        const d = ch.doc.data(); const j = JSON.stringify(d);
        if(this._lastSnap["stu:"+d.id] === j) return;      // 自己寫的,略過
        apply(()=>{
          const i = state.students.findIndex(x=>x.id===d.id);
          if(ch.type==="removed"){ if(i>=0) state.students.splice(i,1); delete this._lastSnap["stu:"+d.id]; }
          else{ if(i>=0) state.students[i]=d; else state.students.push(d); this._lastSnap["stu:"+d.id]=j; }
        });
      });
    }));
    this._unsubs.push(c.collection("data").doc("main").onSnapshot(doc=>{
      if(!doc.exists) return;
      const j = JSON.stringify(doc.data());
      if(this._lastSnap.meta === j) return;
      apply(()=>{
        const meta = doc.data();
        meta.students = state.students; meta.customItems = state.customItems;
        state = backfill(meta);
        this._lastSnap.meta = j;
      });
    }));
    this._unsubs.push(c.collection("items").onSnapshot(snap=>{
      snap.docChanges().forEach(ch=>{
        const d = ch.doc.data(); const j = JSON.stringify(d);
        if(this._lastSnap["item:"+d.id] === j) return;
        apply(()=>{
          const i = state.customItems.findIndex(x=>x.id===d.id);
          if(ch.type==="removed"){ if(i>=0) state.customItems.splice(i,1); delete this._lastSnap["item:"+d.id]; }
          else{ if(i>=0) state.customItems[i]=d; else state.customItems.push(d); this._lastSnap["item:"+d.id]=j; }
        });
      });
    }));
  },
  stopListen(){ this._unsubs.forEach(u=>{ try{u();}catch(e){} }); this._unsubs=[]; },

  /* ── 班級管理 ── */
  async listMyClasses(email){
    const q = await FB.db.collection("classes").where("teacherEmails","array-contains",email).get();
    return q.docs.map(d=>({ cid:d.id, name:(d.data().name||"未命名"), createdAt:d.data().createdAt }));
  },
  async createClass(name, email, fromState){
    const cid = "c" + Date.now().toString(36) + Math.random().toString(36).slice(2,8);
    const src = fromState || freshState();
    src.className = name;
    await FB.db.collection("classes").doc(cid).set({
      name, teacherEmails:[email], createdAt: Date.now()
    });
    // 上傳資料
    const c = FB.db.collection("classes").doc(cid);
    const meta = Object.assign({}, src); delete meta.students; delete meta.customItems;
    if(!meta.teacherEmails || !meta.teacherEmails.length) meta.teacherEmails=[email];
    await c.collection("data").doc("main").set(JSON.parse(JSON.stringify(meta)));
    await Promise.all(src.students.map(s=> c.collection("students").doc(s.id).set(JSON.parse(JSON.stringify(s)))));
    await Promise.all((src.customItems||[]).map(it=> c.collection("items").doc(String(it.id)).set(JSON.parse(JSON.stringify(it)))));
    return cid;
  },

  /* ── 世界排行榜 ── */
  _lbLast: 0,
  async pushLeaderboard(){
    if(!this.on() || !state.lbOptIn) return;
    const now = Date.now();
    if(now - this._lbLast < 5*60*1000) return;             // 5 分鐘節流
    this._lbLast = now;
    const n = state.students.length || 1;
    const total = state.students.reduce((a,s)=>a+(s.totalXp||0),0);
    const weekKey = lbWeekKey();
    const weekXp = (state.xpWeek && state.xpWeek.key===weekKey) ? state.xpWeek.sum : 0;
    await FB.db.collection("leaderboard").doc(this.cid).set({
      name: state.lbName || state.className || "匿名班級",
      students: n, totalXp: total, avgXp: Math.round(total/n),
      weekKey, weekXp, bossKills: state.bossKills||0,
      updatedAt: now
    });
  },
  async fetchLeaderboard(){
    const q = await FB.db.collection("leaderboard").orderBy("avgXp","desc").limit(50).get();
    return q.docs.map(d=>d.data());
  }
};
function lbWeekKey(){
  const d = new Date(); const on = new Date(d.getFullYear(),0,1);
  const w = Math.ceil(((d-on)/86400000 + on.getDay()+1)/7);
  return d.getFullYear()+"w"+w;
}
function stu(id){ return state.students.find(s=>s.id===id); }
function addLog(sid, msg){
  state.log.unshift({t:new Date().toLocaleString("zh-TW",{hour12:false}), sid, msg});
  if(state.log.length>300) state.log.length = 300;
}

/* ── 公式(對照正式系統)──────────────────────────── */
function xpForNextLevel(level){ return level*100; }
function equipStatSum(s){
  const t={atk:0,agi:0,int:0,def:0};
  for(const slot of ALL_SLOTS){
    const it = itemById(s[slot+"Id"]); if(!it) continue;
    t.atk+=it.atk; t.agi+=it.agi; t.int+=it.int; t.def+=it.def;
  }
  return t;
}
/* ══ 技能樹系統 ══════════════════════════════════════
 * 每技能 5 級;累積已花 SP 達門檻才解鎖該階。
 * kind: passive(持續數值) / atk(攻擊時觸發) / def(受擊時觸發) */
const SKILL_BRANCHES = {
  Warrior: [["atk","⚔️ 攻擊"],["def","🛡 防禦"],["sur","❤️ 生存"]],
  Mage:    [["fire","🔥 火系"],["thunder","⚡ 雷系"],["ice","❄️ 冰系"]],
  Rogue:   [["burst","🗡 爆發"],["gold","💰 財富"],["support","🎯 輔助"]],
  Cleric:  [["heal","💚 治療"],["buff","✨ 增益"],["smite","🔨 懲擊"]],
};
/* 每技能 5 級;分支內位置 pos(1/2/3),下層需累積「同分支已投入 SP」達 gate。
 * kind: passive/atk(攻擊觸發)/def(受擊觸發)。desc 精簡一句。 */
const BRANCH_GATE = [0, 3, 6];   // pos1/2/3 的同分支累積門檻
const SKILL_TREES = {
  common: [
    { id:"wealth", name:"財富嗅覺", icon:"💰", branch:"c", pos:1, kind:"passive", short:"金幣+", desc:(v)=>"金幣獲得 +"+v+"%", val:[3,6,9,12,15], chance:null },
    { id:"study",  name:"勤學",     icon:"📖", branch:"c", pos:2, kind:"passive", short:"XP+",  desc:(v)=>"XP 獲得 +"+v+"%", val:[3,6,9,12,15], chance:null },
    { id:"tough",  name:"強健",     icon:"❤️", branch:"c", pos:3, kind:"passive", short:"HP+",  desc:(v)=>"最大 HP +"+v, val:[6,12,18,24,30], chance:null },

const SKILL_GATES = { 1:0, 2:5, 3:10, 4:15 };
function skillList(job){ return SKILL_TREES.common.concat(SKILL_TREES[job] || []); }
function skillDef(job, id){ return skillList(job).find(sk=>sk.id===id); }
function skillLv(s, id){ return (s.skills && s.skills[id]) || 0; }
function spSpent(s){ let n=0; for(const k in (s.skills||{})) n += s.skills[k]; return n; }
function spSpentBranch(s, job, branch){
  let n = 0;
  for(const sk of skillList(job)) if(sk.branch===branch) n += skillLv(s, sk.id);
  return n;
}
function skillUnlocked(s, sk){ return spSpentBranch(s, s.job, sk.branch) >= BRANCH_GATE[sk.pos-1]; }
function canLevelSkill(s, sk){
  const lv = skillLv(s, sk.id);
  return lv < 5 && s.spPoints > 0 && skillUnlocked(s, sk);
}
function skillVal(s, id){ const sk = skillDef(s.job, id); const lv = skillLv(s, id); return (sk && lv>0) ? sk.val[lv-1] : 0; }
function skillChance(s, id){ const sk = skillDef(s.job, id); const lv = skillLv(s, id); return (sk && lv>0 && sk.chance) ? sk.chance[lv-1] : 0; }
function skillsEnabled(){ return !state.skillsOff; }
function skillPassive(s, id){ return skillsEnabled() ? skillVal(s, id) : 0; }

function skillTreePanel(s){
  if(!skillsEnabled()) return '<div class="panel"><div class="mini">老師目前關閉了技能樹功能。你的 SP 會保留,開啟後即可分配。</div></div>';
  const jobZh = {Warrior:"戰士",Mage:"法師",Rogue:"遊俠",Cleric:"牧師"};
  const branches = SKILL_BRANCHES[s.job] || [];
  // 一個技能節點
  const node = (sk)=>{
    const lv = skillLv(s, sk.id);
    const can = canLevelSkill(s, sk);
    const need = BRANCH_GATE[sk.pos-1];
    const has = spSpentBranch(s, s.job, sk.branch);
    const locked = has < need;
    const dots = [1,2,3,4,5].map(i=>'<span style="display:inline-block;width:10px;height:10px;border-radius:2px;margin:0 1px;border:1.5px solid #141414;background:'+(i<=lv?"var(--gold)":"#fff")+'"></span>').join("");
    const kindTag = sk.kind==="atk"?"🗡":sk.kind==="def"?"🛡":sk.kind==="aura"?"📣光環":"⚙";
    const curDesc = lv>0 ? sk.desc(sk.val[lv-1], sk.chance?sk.chance[lv-1]:null)
                         : sk.desc(sk.val[0], sk.chance?sk.chance[0]:null);
    return '<div style="background:#fff;border:3px solid #141414;border-radius:9px;padding:8px;box-shadow:3px 3px 0 rgba(0,0,0,.85);'+(lv>0?"outline:2px solid var(--gold);outline-offset:-6px;":"")+(locked?"opacity:.5":"")+'">'
      + '<div style="display:flex;align-items:center;gap:5px">'
      + '<span style="font-size:17px">'+sk.icon+'</span><b style="font-size:13px;color:#141414;font-weight:900">'+esc(sk.name)+'</b>'
      + '<span style="font-size:12px">'+kindTag+'</span>'
      + '<button class="btn'+(can?" gold":"")+'" data-skup="'+sk.id+'"'+(can?"":" disabled")+' style="margin-left:auto;padding:3px 11px">+</button></div>'
      + '<div style="margin:4px 0">'+dots+' <span class="num" style="color:#141414;font-weight:700">'+lv+'/5</span></div>'
      + '<div style="line-height:1.5;color:#333;font-size:12px">'+esc(curDesc)+'</div>'
      + (locked ? '<div style="color:#c0392b;font-size:12px;font-weight:700;margin-top:3px">🔒 本分支再投 '+(need-has)+' SP</div>' : "")
      + '</div>';
  };
  // 三分支並排,每分支直向三格 + 連接線
  let cols = '<div style="display:flex;gap:8px;align-items:stretch">';
  for(const [bkey, blabel] of branches){
    const inB = (SKILL_TREES[s.job]||[]).filter(sk=>sk.branch===bkey).sort((a,b)=>a.pos-b.pos);
    let col = '<div style="flex:1;min-width:0"><div style="text-align:center;font-weight:900;font-size:13px;margin-bottom:8px;color:#141414;background:var(--gold);border:2px solid #141414;border-radius:6px;padding:3px 4px;box-shadow:2px 2px 0 rgba(0,0,0,.85)">'+blabel+'</div>';
    inB.forEach((sk,i)=>{
      if(i>0) col += '<div style="text-align:center;line-height:1;color:#141414;font-size:16px;font-weight:900;margin:2px 0">▼</div>';
      col += node(sk);
    });
    col += '<div style="text-align:center;margin-top:5px;font-size:12px;font-weight:700;color:#141414">已投入 '+spSpentBranch(s,s.job,bkey)+' SP</div></div>';
    cols += col;
  }
  cols += '</div>';
  // 效果總覽
  const summary=[], atkList=[], defList=[];
  for(const sk of skillList(s.job)){
    const lv=skillLv(s,sk.id); if(!lv) continue;
    if(sk.kind==="passive") summary.push(sk.icon+sk.name+":"+sk.desc(sk.val[lv-1]));
    else if(sk.kind==="aura") atkList.push(sk.icon+sk.name+"(光環) "+(sk.chance?sk.chance[lv-1]+"%":""));
    else if(sk.kind==="atk") atkList.push(sk.icon+sk.name+" "+(sk.chance?sk.chance[lv-1]+"%":""));
    else defList.push(sk.icon+sk.name+" "+(sk.chance&&sk.chance[lv-1]?sk.chance[lv-1]+"%":""));
  }
  const overview = '<div class="panel"><h3>🌳 '+jobZh[s.job]+' 技能樹</h3>'
    + '<div style="line-height:1.9;color:#333;font-size:13px">可用 SP:<b class="num" style="color:#c0392b;font-size:16px">'+s.spPoints+'</b>・三條分支任選:專精一條或混點。往下要先在<b>同分支</b>投入 3/6 SP 解鎖。<br>'
    + (summary.length?"持續:"+summary.join("、")+"<br>":"")
    + (atkList.length?"🗡攻擊觸發:"+atkList.join("、")+"<br>":"")
    + (defList.length?"🛡受擊觸發:"+defList.join("、"):"")
    + (!summary.length&&!atkList.length&&!defList.length?"還沒點技能——升級得 1 SP,轉職(Lv5/15/30)+2。":"")
    + '</div></div>';
  // 共用樹(簡列)
  let common = '<div class="panel"><h3>🌐 共用技能</h3><div style="display:flex;gap:8px">';
  for(const sk of SKILL_TREES.common) common += '<div style="flex:1">'+node(sk)+'</div>';
  common += '</div><div style="margin-top:6px;color:#5a5a5a;font-size:12px">想重來?商店「洗技藥水」退還全部 SP。</div></div>';
  return overview + '<div class="panel">' + cols + '</div>' + common;
}
function levelSkill(sid, id){
  const s = stu(sid); if(!s) return;
  const sk = skillDef(s.job, id); if(!sk) return;
  if(!canLevelSkill(s, sk)){ toast("無法升級:SP 不足、已滿級、或前置階未解鎖", true); return; }
  s.skills[id] = skillLv(s, id) + 1;
  s.spPoints--;
  addLog(sid, "技能「"+sk.name+"」升到 Lv"+s.skills[id]);
  save(); toast(sk.icon+" "+sk.name+" → Lv"+s.skills[id]); render();
}

function totalStats(s){
  const e = equipStatSum(s);
  const t = {atk:s.baseAtk+e.atk, agi:s.baseAgi+e.agi, int:s.baseInt+e.int, def:s.baseDef+e.def};
  t.int += skillPassive(s,"blizzard") + skillPassive(s,"wrath");
  return t;
}
function skillMaxHpBonus(s){ return skillPassive(s,"tough"); }
function xpMultiplier(s){ return Math.max(0.01, 1 + (totalStats(s).int-10)*0.02) * (1 + skillPassive(s,"study")/100); }
function goldMultiplier(s){ return Math.max(0.01, 1 + (totalStats(s).agi-10)*0.02) * (1 + skillPassive(s,"wealth")/100); }

/* 升級:依職業成長屬性、+10 HP 並回滿(v2 設計) */
function applyLevelUps(s, gainedXp){
  s.xp += gainedXp; s.totalXp += gainedXp;
  let ups = 0;
  while(s.xp >= xpForNextLevel(s.level)){
    s.xp -= xpForNextLevel(s.level);
    s.level++; s.spPoints++; ups++;
    if(s.level===5 || s.level===15 || s.level===30) s.spPoints += 2;   // 轉職里程碑
    const g = JOB_INFO[s.job].growth;
    s.baseAtk+=g.atk; s.baseDef+=g.def; s.baseAgi+=g.agi; s.baseInt+=g.int;
    s.maxHp += 10; s.currentHp = s.maxHp;
  }
  return ups;
}

/* ── 成就 ─────────────────────────────────────────── */
function unlock(s, achId){
  if(s.achievements.includes(achId)) return;
  const a = ACHIEVEMENTS.find(x=>x.id===achId); if(!a) return;
  s.achievements.push(achId);
  addLog(s.id, "解鎖成就「"+a.name+"」"+a.icon);
  toast(a.icon+" "+s.name+" 解鎖成就:"+a.name);
  sfx("achieve");
}
function checkAchievements(s){
  if(s.level>=3) unlock(s,"lv3");
  if(s.level>=5) unlock(s,"lv5");
  if(s.gold>=1000) unlock(s,"gold1000");
  if(EQUIP_SLOTS.every(slot=>s[slot+"Id"])) unlock(s,"fullset");
}

/* ── 老師加分(即時回饋 + 寶箱 + 班級目標)─────────── */
function reward(sid, baseXp, baseGold, reason, fxPoint){
  const s = stu(sid); if(!s) return;
  const fx = Math.round(baseXp * xpMultiplier(s));
  const fg = Math.round(baseGold * goldMultiplier(s));
  const ups = applyLevelUps(s, fx);
  s.gold += fg;
  state.classGoal.progress += fx;

  let extra = "";
  if(Math.random() < 0.12 && (fx>0 || fg>0)){   // 寶箱事件
    const bonus = 10 + Math.floor(Math.random()*21);
    s.gold += bonus;
    extra = ",並發現寶箱 🎁 +"+bonus+" 金幣!";
    sfx("chest");
  }
  addLog(sid, (reason||"老師獎勵")+",獲得 "+fx+" XP 和 "+fg+" 金幣"+(ups?",升至 Lv."+s.level+"!":"")+extra);
  checkAchievements(s);
  checkClassGoal();
  save();

  if(fxPoint){
    if(fx>0) floatFx("+"+fx+" XP", fxPoint.x, fxPoint.y, "var(--xp)");
    if(fg>0) floatFx("+"+fg+" 金", fxPoint.x + 24, fxPoint.y + 18, "var(--gold)");
  }
  if(ups){ levelUpFx(s.name+" 升至 Lv."+s.level+"!"); sfx("levelup"); }
  else sfx("award");
  render();
}
function rewardGroup(groupName, baseXp, baseGold, reason){
  const members = state.students.filter(s=>s.group===groupName);
  if(!members.length){ toast("這一組沒有成員", true); return; }
  for(const m of members) reward(m.id, baseXp, baseGold, reason || (groupName+" 組獎勵"));
  toast(groupName+" 組全員獎勵完成("+members.length+" 人)");
}
function checkClassGoal(){
  const g = state.classGoal;
  if(!g.celebrated && g.progress >= g.target){
    g.celebrated = true;
    addLog("-", "🎉 全班達成共同目標 "+g.target+" XP!");
    levelUpFx("🎉 班級目標達成!");
    sfx("goal");
  }
}
