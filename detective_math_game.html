<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>數據偵探：真相只有一個</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0c12;--bg2:#12141f;--bg3:#181b28;--bg4:#1e2130;--bg5:#232638;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);--border3:rgba(255,255,255,0.18);
  --text:#ede9e0;--text2:#9a9690;--text3:#52505a;
  --amber:#c9983a;--amber2:#f0c560;--amber3:#ffd97a;
  --blue:#4a8fd4;--blue2:#6aaef5;
  --green:#2eaa6a;--green2:#4cd49a;
  --red:#c94040;--red2:#f06060;
  --purple:#7a5fd0;--teal:#2aadaa;--teal2:#4eddda;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;overflow-x:hidden;line-height:1.6}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 90% 60% at 10% 5%,rgba(201,152,58,.07) 0%,transparent 50%),
    radial-gradient(ellipse 70% 50% at 90% 90%,rgba(74,143,212,.05) 0%,transparent 50%),
    radial-gradient(ellipse 40% 30% at 50% 50%,rgba(122,95,208,.03) 0%,transparent 60%);}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px);
  background-size:32px 32px;}
.wrap{max-width:1000px;margin:0 auto;padding:0 20px 48px;position:relative;z-index:1}

/* ── HUD ── */
.hud{display:flex;align-items:center;gap:10px;padding:14px 18px;margin-bottom:20px;
  background:linear-gradient(135deg,var(--bg2) 0%,var(--bg3) 100%);
  border:1px solid var(--border2);border-radius:16px;
  box-shadow:0 4px 24px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.06);
  flex-wrap:wrap;position:sticky;top:10px;z-index:50;backdrop-filter:blur(12px);}
.hud-logo{font-family:'Noto Serif TC',serif;font-size:18px;font-weight:700;white-space:nowrap;display:flex;align-items:center;gap:8px}
.hud-logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,rgba(201,152,58,.3),rgba(201,152,58,.08));border:1px solid rgba(201,152,58,.4);display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 14px rgba(201,152,58,.2)}
.hud-logo-txt{display:flex;flex-direction:column}
.hud-logo-txt span{color:var(--amber2)}
.hud-logo-sub{font-size:9px;color:var(--text3);letter-spacing:2px;font-family:'Noto Sans TC',sans-serif;font-weight:400;margin-top:1px}
.hud-sep{width:1px;height:22px;background:var(--border2);flex-shrink:0;margin:0 2px}
.badge{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid;white-space:nowrap;letter-spacing:.3px;transition:all .2s}
.b-stage{border-color:rgba(74,143,212,.45);background:linear-gradient(135deg,rgba(74,143,212,.15),rgba(74,143,212,.05));color:var(--blue2);box-shadow:0 0 10px rgba(74,143,212,.12)}
.b-type{border-color:rgba(42,173,170,.4);background:linear-gradient(135deg,rgba(42,173,170,.12),rgba(42,173,170,.04));color:var(--teal2)}
.b-score{border-color:rgba(201,152,58,.5);background:linear-gradient(135deg,rgba(201,152,58,.2),rgba(201,152,58,.07));color:var(--amber2);font-weight:700;box-shadow:0 0 10px rgba(201,152,58,.12)}
.b-streak{border-color:rgba(122,95,208,.45);background:linear-gradient(135deg,rgba(122,95,208,.18),rgba(122,95,208,.06));color:#a090f0}
.hud-right{margin-left:auto;display:flex;align-items:center;gap:11px;flex-shrink:0}
.hp-bar{display:flex;gap:3px}
.heart{font-size:20px;transition:all .3s;filter:drop-shadow(0 0 4px rgba(217,80,80,.5))}
.heart.lost{opacity:.18;transform:scale(.75);filter:none}
.timer-box{padding:6px 15px;border-radius:20px;font-size:15px;font-weight:700;min-width:66px;text-align:center;letter-spacing:.5px;border:1px solid rgba(46,170,106,.5);background:linear-gradient(135deg,rgba(46,170,106,.18),rgba(46,170,106,.06));color:var(--green2);box-shadow:0 0 12px rgba(46,170,106,.18);transition:all .3s}
.timer-box.warn{border-color:rgba(201,152,58,.55);background:linear-gradient(135deg,rgba(201,152,58,.2),rgba(201,152,58,.07));color:var(--amber2);box-shadow:0 0 12px rgba(201,152,58,.18)}
.timer-box.danger{border-color:rgba(201,64,64,.6);background:linear-gradient(135deg,rgba(201,64,64,.22),rgba(201,64,64,.08));color:var(--red2);box-shadow:0 0 14px rgba(201,64,64,.25);animation:timerPulse 1s ease infinite}
@keyframes timerPulse{0%,100%{box-shadow:0 0 14px rgba(201,64,64,.25)}50%{box-shadow:0 0 24px rgba(201,64,64,.55)}}

/* ── Progress ── */
.prog-row{display:flex;align-items:center;gap:5px;margin-bottom:18px;padding:0 2px}
.prog-lbl{font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-right:8px}
.pdot{height:5px;border-radius:3px;background:var(--border2);transition:all .4s cubic-bezier(.4,0,.2,1);flex:1;max-width:30px}
.pdot.done{background:linear-gradient(90deg,var(--green),var(--green2));box-shadow:0 0 7px rgba(46,170,106,.4)}
.pdot.cur{background:linear-gradient(90deg,var(--amber),var(--amber2));box-shadow:0 0 9px rgba(201,152,58,.5);animation:dotPulse 1.5s ease infinite}
@keyframes dotPulse{0%,100%{opacity:1}50%{opacity:.6}}

/* ── Layout ── */
.main{display:grid;grid-template-columns:40% 1fr;gap:16px;align-items:start}
@media(max-width:720px){.main{grid-template-columns:1fr}}
.panel{background:linear-gradient(160deg,var(--bg2) 0%,var(--bg3) 100%);border:1px solid var(--border2);border-radius:18px;padding:20px;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.38),inset 0 1px 0 rgba(255,255,255,.05)}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent 0%,rgba(201,152,58,.6) 40%,rgba(240,197,96,.85) 50%,rgba(201,152,58,.6) 60%,transparent 100%)}
.ptitle{font-size:10px;color:var(--text3);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px;font-weight:600}
.ptitle-dot{width:6px;height:6px;border-radius:50%;background:var(--amber);flex-shrink:0;box-shadow:0 0 7px rgba(201,152,58,.6)}
canvas{width:100%;display:block;border-radius:10px}
.diff-tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;border:1px solid;margin-bottom:12px;letter-spacing:.3px}
.diff-easy{border-color:rgba(46,170,106,.45);background:rgba(46,170,106,.12);color:var(--green2)}
.diff-med{border-color:rgba(201,152,58,.45);background:rgba(201,152,58,.12);color:var(--amber2)}
.diff-hard{border-color:rgba(201,64,64,.45);background:rgba(201,64,64,.12);color:var(--red2)}
.hint-box{margin-top:14px;background:linear-gradient(135deg,rgba(201,152,58,.08),rgba(201,152,58,.03));border:1px solid rgba(201,152,58,.2);border-radius:10px;padding:11px 14px;font-size:13px;color:rgba(201,152,58,.9);line-height:1.7;display:flex;gap:9px}

/* ── Suspects ── */
.suspects{display:flex;flex-direction:column;gap:11px}
.suspect{background:linear-gradient(135deg,var(--bg3) 0%,var(--bg4) 100%);border:1px solid var(--border);border-radius:14px;padding:15px;position:relative;overflow:hidden;transition:all .2s cubic-bezier(.4,0,.2,1)}
.suspect:hover:not(.disabled){border-color:rgba(201,152,58,.3);box-shadow:0 0 18px rgba(201,152,58,.1);transform:translateY(-1px)}
.suspect::before{content:'';position:absolute;top:0;right:0;bottom:0;left:0;background:repeating-linear-gradient(-45deg,transparent,transparent 20px,rgba(255,255,255,.006) 20px,rgba(255,255,255,.006) 21px);pointer-events:none}
.s-hd{display:flex;align-items:center;gap:11px;margin-bottom:11px}
.avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif TC',serif;font-weight:700;font-size:16px;flex-shrink:0;border:1.5px solid;transition:all .2s;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.av0{background:linear-gradient(135deg,rgba(74,143,212,.25),rgba(74,143,212,.1));color:var(--blue2);border-color:rgba(74,143,212,.4);box-shadow:0 0 10px rgba(74,143,212,.2)}
.av1{background:linear-gradient(135deg,rgba(46,170,106,.25),rgba(46,170,106,.1));color:var(--green2);border-color:rgba(46,170,106,.4);box-shadow:0 0 10px rgba(46,170,106,.2)}
.av2{background:linear-gradient(135deg,rgba(201,152,58,.25),rgba(201,152,58,.1));color:var(--amber2);border-color:rgba(201,152,58,.4);box-shadow:0 0 10px rgba(201,152,58,.2)}
.s-name{font-weight:700;font-size:15px;color:var(--text)}
.s-role{font-size:11px;color:var(--text3);margin-top:2px;letter-spacing:.3px}
.tline{font-size:14px;color:var(--text2);line-height:1.75;padding:10px 13px;background:rgba(0,0,0,.18);border-left:2px solid var(--border2);border-radius:0 8px 8px 0;margin-bottom:7px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;transition:all .15s;user-select:none;position:relative}
.tline:last-child{margin-bottom:0}
.tline:hover:not(.locked){background:rgba(255,255,255,.04);border-left-color:rgba(201,152,58,.4)}
.tline.ok{border-left-color:var(--green2);background:rgba(46,170,106,.07)}
.tline.sus{border-left-color:var(--red2);background:rgba(201,64,64,.07)}
.tline.locked{cursor:default}
.tline-txt{flex:1}
.tmark{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:1px;transition:all .2s;background:rgba(0,0,0,.2)}
.tline.ok .tmark{background:rgba(46,170,106,.25);border-color:rgba(46,170,106,.6);color:var(--green2);box-shadow:0 0 8px rgba(46,170,106,.3)}
.tline.sus .tmark{background:rgba(201,64,64,.25);border-color:rgba(201,64,64,.6);color:var(--red2);box-shadow:0 0 8px rgba(201,64,64,.3)}
.score-pop{position:absolute;right:12px;top:6px;font-size:13px;font-weight:700;pointer-events:none;animation:scorePop .9s ease forwards;z-index:10}
.score-pop.plus{color:var(--green2);text-shadow:0 0 8px rgba(46,170,106,.6)}
@keyframes scorePop{0%{opacity:1;transform:translateY(0) scale(1)}60%{opacity:1;transform:translateY(-20px) scale(1.2)}100%{opacity:0;transform:translateY(-34px) scale(.85)}}

/* ── Accuse ── */
.accuse-section{margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.06)}
.accuse-lbl{font-size:12px;color:var(--text3);margin-bottom:10px;letter-spacing:.5px}
.accuse-btns{display:flex;gap:9px}
.accuse-btn{flex:1;padding:11px 8px;border-radius:10px;border:1px solid var(--border2);background:linear-gradient(135deg,var(--bg4),var(--bg5));color:var(--text2);font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:7px;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.accuse-btn:not(:disabled):hover{border-color:rgba(201,64,64,.55);background:linear-gradient(135deg,rgba(201,64,64,.12),rgba(201,64,64,.05));color:var(--red2);box-shadow:0 0 14px rgba(201,64,64,.2);transform:translateY(-1px)}
.accuse-btn:disabled{opacity:.3;cursor:default}
.accuse-btn.liar-reveal{border-color:rgba(201,64,64,.6);background:linear-gradient(135deg,rgba(201,64,64,.18),rgba(201,64,64,.07));color:var(--red2);opacity:1;box-shadow:0 0 16px rgba(201,64,64,.25)}
.accuse-btn.truth-reveal{opacity:.25}

/* ── Feedback ── */
.fb{padding:13px 16px;border-radius:11px;font-size:13px;line-height:1.8;margin-top:13px;display:none;animation:fadeUp .3s ease}
.fb.show{display:block}
.fb.ok{background:linear-gradient(135deg,rgba(46,170,106,.12),rgba(46,170,106,.05));border:1px solid rgba(46,170,106,.3);color:#6de8ae;box-shadow:0 0 16px rgba(46,170,106,.1)}
.fb.fail{background:linear-gradient(135deg,rgba(201,64,64,.1),rgba(201,64,64,.04));border:1px solid rgba(201,64,64,.3);color:var(--red2)}

/* ── Next btn ── */
.next-btn{display:none;margin-top:13px;width:100%;padding:12px;background:linear-gradient(135deg,rgba(201,152,58,.12),rgba(201,152,58,.05));border:1px solid rgba(201,152,58,.35);border-radius:10px;color:var(--amber2);font-family:'Noto Sans TC',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.3px;box-shadow:0 0 10px rgba(201,152,58,.1)}
.next-btn:hover{background:linear-gradient(135deg,rgba(201,152,58,.22),rgba(201,152,58,.1));border-color:rgba(201,152,58,.6);box-shadow:0 0 18px rgba(201,152,58,.2)}
.next-btn.show{display:block}

/* ── Toast ── */
.toast{position:fixed;top:74px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--bg3),var(--bg2));border:1px solid rgba(201,152,58,.45);border-radius:24px;padding:9px 22px;font-size:14px;color:var(--amber2);font-weight:600;pointer-events:none;opacity:0;transition:opacity .25s;z-index:200;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.4),0 0 14px rgba(201,152,58,.2)}
.toast.show{opacity:1}

/* ── Data Chips ── */
.drow{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.dchip{padding:5px 11px;border-radius:8px;font-size:13px;font-weight:600;background:rgba(255,255,255,.05);border:1px solid var(--border2);color:var(--text);font-family:'Noto Serif TC',serif;transition:all .2s}
.dchip.out{background:rgba(201,64,64,.12);border-color:rgba(201,64,64,.35);color:var(--red2);box-shadow:0 0 8px rgba(201,64,64,.18)}

/* ── 第二關 計算題 ── */
.calc-question{animation:fadeUp .35s ease}
.calc-chart-wrap{background:linear-gradient(160deg,var(--bg2),var(--bg3));border:1px solid var(--border2);border-radius:18px;padding:20px;position:relative;overflow:hidden;box-shadow:0 8px 28px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.05)}
.calc-chart-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(42,173,170,.7),transparent)}
.calc-question-panel{background:linear-gradient(160deg,var(--bg2),var(--bg3));border:1px solid var(--border2);border-radius:18px;padding:22px;position:relative;overflow:hidden;box-shadow:0 8px 28px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.05)}
.calc-question-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(201,152,58,.7),transparent)}
.calc-q-text{font-size:18px;font-weight:500;color:var(--text);line-height:1.75;margin-bottom:20px}
.calc-q-text em{color:var(--amber3);font-style:normal;font-weight:700;text-shadow:0 0 12px rgba(201,152,58,.4)}
.calc-input-row{display:flex;gap:11px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.calc-input{padding:12px 18px;border-radius:10px;border:1.5px solid var(--border2);background:rgba(0,0,0,.25);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:18px;font-weight:600;width:170px;outline:none;transition:all .2s;text-align:center;box-shadow:inset 0 2px 8px rgba(0,0,0,.3)}
.calc-input:focus{border-color:rgba(201,152,58,.65);box-shadow:inset 0 2px 8px rgba(0,0,0,.3),0 0 12px rgba(201,152,58,.2)}
.calc-input.correct{border-color:rgba(46,170,106,.65);background:rgba(46,170,106,.08);color:var(--green2);box-shadow:0 0 12px rgba(46,170,106,.2)}
.calc-input.wrong{border-color:rgba(201,64,64,.55);background:rgba(201,64,64,.07);color:var(--red2)}
.calc-unit{font-size:15px;color:var(--text2);font-weight:500}
.calc-submit{padding:12px 24px;border-radius:10px;border:1px solid rgba(201,152,58,.45);background:linear-gradient(135deg,rgba(201,152,58,.2),rgba(201,152,58,.08));color:var(--amber2);font-family:'Noto Sans TC',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 0 10px rgba(201,152,58,.12)}
.calc-submit:hover:not(:disabled){background:linear-gradient(135deg,rgba(201,152,58,.35),rgba(201,152,58,.15));box-shadow:0 0 18px rgba(201,152,58,.28)}
.calc-submit:disabled{opacity:.35;cursor:default}
.calc-hint-box{background:rgba(42,173,170,.07);border:1px solid rgba(42,173,170,.2);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--teal2);line-height:1.65;margin-bottom:14px;display:flex;gap:7px}
.calc-fb{padding:13px 16px;border-radius:11px;font-size:13px;line-height:1.8;margin-top:13px;display:none;animation:fadeUp .3s ease}
.calc-fb.show{display:block}
.calc-fb.ok{background:linear-gradient(135deg,rgba(46,170,106,.12),rgba(46,170,106,.05));border:1px solid rgba(46,170,106,.3);color:#6de8ae;box-shadow:0 0 14px rgba(46,170,106,.1)}
.calc-fb.fail{background:linear-gradient(135deg,rgba(201,64,64,.1),rgba(201,64,64,.04));border:1px solid rgba(201,64,64,.3);color:var(--red2)}
.calc-step{background:rgba(0,0,0,.25);border-radius:8px;padding:9px 13px;font-size:13px;color:var(--text2);margin-top:9px;font-family:'Noto Serif TC',serif;line-height:1.9;border-left:2px solid rgba(201,152,58,.3)}
.data-display{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
.data-num{padding:6px 12px;border-radius:8px;font-size:14px;font-weight:600;background:rgba(255,255,255,.06);border:1px solid var(--border2);color:var(--text);font-family:'Noto Serif TC',serif;transition:all .15s}
.data-num:hover{border-color:rgba(201,152,58,.3);background:rgba(201,152,58,.06)}

/* ── LB ── */
.lb-tabs{display:flex;gap:0;margin-bottom:16px;border-radius:12px;overflow:hidden;border:1px solid var(--border2);box-shadow:0 4px 14px rgba(0,0,0,.3)}
.lb-tab{flex:1;padding:10px;font-size:13px;font-weight:600;border:none;background:var(--bg3);color:var(--text3);cursor:pointer;transition:all .2s;font-family:'Noto Sans TC',sans-serif;letter-spacing:.3px}
.lb-tab.active{background:linear-gradient(135deg,rgba(201,152,58,.18),rgba(201,152,58,.07));color:var(--amber2)}
.lb-tab:not(:last-child){border-right:1px solid var(--border2)}
.lb-wrap{max-width:460px;margin:0 auto}
.lb-row{display:flex;align-items:center;gap:11px;padding:10px 15px;border-radius:11px;background:linear-gradient(135deg,var(--bg3),var(--bg4));border:1px solid var(--border);margin-bottom:7px;font-size:13px;transition:all .15s;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.lb-row.me{border-color:rgba(201,152,58,.45);background:linear-gradient(135deg,rgba(201,152,58,.1),rgba(201,152,58,.04));box-shadow:0 0 14px rgba(201,152,58,.12)}
.lb-rank{width:26px;font-weight:700;color:var(--text3);text-align:center;flex-shrink:0;font-family:'Noto Serif TC',serif;font-size:15px}
.lb-rank.gold{color:#f0c560;text-shadow:0 0 8px rgba(240,197,96,.5)}
.lb-rank.silver{color:#b0b8cc}
.lb-rank.bronze{color:#d08860}
.lb-name{flex:1;font-weight:500;color:var(--text);font-size:14px}
.lb-score{font-weight:700;color:var(--amber2);font-family:'Noto Serif TC',serif;font-size:16px}
.lb-meta{font-size:11px;color:var(--text3);margin-left:4px}
.lb-empty{text-align:center;padding:22px;color:var(--text3);font-size:13px}

/* ── Screen / Stats ── */
.screen{text-align:center;padding:52px 20px 36px;animation:fadeUp .5s ease}
.screen-icon{font-size:58px;margin-bottom:16px;display:block;animation:iconBounce .6s cubic-bezier(.4,0,.2,1);filter:drop-shadow(0 0 20px rgba(201,152,58,.4))}
@keyframes iconBounce{0%{transform:scale(.6) translateY(10px);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
.screen-title{font-family:'Noto Serif TC',serif;font-size:26px;font-weight:700;margin-bottom:10px;letter-spacing:.5px}
.screen-sub{font-size:14px;color:var(--text2);line-height:1.85;margin-bottom:26px}

.stat-l{font-size:11px;color:var(--text3);margin-top:4px;letter-spacing:.5px}

.shake{animation:shake .4s ease}
.q-wrap{animation:fadeUp .35s ease}

<script>
/* ══════ UTILS ══════ */
const COLORS=['#4a90d9','#3db87a','#d4a843','#8b6fd4','#d95050','#3bbfaa'];
const R5=(lo,hi)=>{ // random multiple of 5 in [lo,hi]
  const base=Math.ceil(lo/5);
  const top=Math.floor(hi/5);
  return (Math.floor(Math.random()*(top-base+1))+base)*5;
};

/* ══════ 第三關題目：數值全為5的倍數，承接第二關各圖表與統計量概念 ══════
   Q0 圓餅圖   → 比例換算人數（第二關算過）
   Q1 長條圖   → 不連續類別差值（第二關算過）
   Q2 雙組長條 → 逐項比較，不能以偏概全
   Q3 折線圖   → 斜率最陡=增加最多（第二關選過）
   Q4 雙折線   → 交叉點判斷領先段
   Q5 直方圖   → 60分以下人數（第二關算過）
   Q6 平均數   → 極端值拉高平均，中位數更具代表性
   Q7 列聯表   → 單列合計 vs 整體合計
   Q8 眾數     → 出現最多次的類別名稱
═══════════════════════════════════════════════════════════════════════════ */

function makeQuestions(){
  return [

/* ── Q0 圓餅圖：比例換算人數 ──────────────────────────────────────────
   承接第二關：R2-0 算過「比例×總人數÷100＝人數」
   謊言：知道「英文佔20%、全班200人」，卻說「英文有20人」（忘記乘以總人數）
──────────────────────────────────────────────────────────────────────── */
(()=>{
  const cats=['數學','國文','英文','自然','社會'];
  const pcts=[35,25,20,10,10];
  const total=200;
  const vals=pcts.map(p=>total*p/100); // [70,50,40,20,20]
  return {
    type:'pie', typeLabel:'圓餅圖', diff:'easy',
    data:{cats,vals,pcts,total},
    hint:'💡 人數 ＝ 總人數 × 比例% ÷ 100，不能直接把 % 當成人數。',
    suspects:[
      {name:'小明',role:'班長',truth:true,
       text:'「數學」佔 35%，全班 200 人，換算有 70 人選數學。'},
      {name:'小華',role:'學委',truth:true,
       text:'「英文」佔 20%，全班 200 人，換算有 40 人選英文。'},
      {name:'小美',role:'同學',liar:true,
       text:'「英文」佔 20%，全班 200 人，所以選英文的有 20 人。'},
    ],
    explanation:'英文人數應為 200 × 20% ＝ 40 人，不是 20 人。小美把百分比數字直接當人數，忘記乘以總人數 200。'
  };
})(),

/* ── Q1 長條圖：不連續類別差值 ────────────────────────────────────────
   承接第二關：R2-1 算過「差值＝大的減小的」
   謊言：長條圖顯示籃球60人、游泳35人，說「差了 10 人」
──────────────────────────────────────────────────────────────────────── */
(()=>{
  const labels=['籃球','足球','羽球','桌球','游泳'];
  const vals=[60,30,45,15,35];
  return {
    type:'bar', typeLabel:'長條圖', diff:'easy',
    data:{labels,vals,unit:'人',subject:'社團人數'},
    hint:'💡 差值要用「較大的數字」減「較小的數字」，直接看長條高度再相減。',
    suspects:[
      {name:'體育組長',role:'學務處',truth:true,
       text:'「籃球」60 人，「游泳」35 人，兩者相差 25 人。'},
      {name:'小琳',role:'活動組',truth:true,
       text:'「籃球」60 人最多，「桌球」15 人最少，最大差距是 45 人。'},
      {name:'阿芸',role:'學委代表',liar:true,
       text:'「籃球」60 人，「游泳」35 人，兩者相差 10 人。'},
    ],
    explanation:'60 − 35 ＝ 25 人，不是 10 人。阿芸的差值計算錯誤。'
  };
})(),

/* ── Q2 雙組長條圖：逐項比較 ──────────────────────────────────────────
   承接第二關概念：不能用某一項贏就說整體贏
   謊言：甲班數學85分贏，就說甲班每科都贏
──────────────────────────────────────────────────────────────────────── */
(()=>{
  const groups=['國文','數學','英文','自然'];
  const vA=[70,85,65,75];
  const vB=[80,70,75,70];
  return {
    type:'grouped', typeLabel:'雙組長條圖', diff:'easy',
    data:{groups,valsA:vA,valsB:vB,gA:'甲班',gB:'乙班',unit:'分'},
    hint:'💡 每個科目要分開比較，甲在某科贏，不代表每科都贏。',
    suspects:[
      {name:'小雯',role:'統計組長',truth:true,
       text:'甲班「數學」85 > 乙班 70、「自然」75 > 乙班 70，但「國文」70 < 乙班 80、「英文」65 < 乙班 75，兩班各贏 2 科。'},
      {name:'老陳',role:'導師',truth:true,
       text:'甲班四科加總 295 分，乙班四科加總 295 分，兩班總分相同。'},
      {name:'阿強',role:'家長代表',liar:true,
       text:'甲班「數學」85 分，高於乙班 70 分，所以甲班每一科都比乙班優秀。'},
    ],
    explanation:'甲班「國文」70 < 乙班 80、「英文」65 < 乙班 75，甲班並非每科都贏。阿強只看數學一科就下全面結論。'
  };
})(),

/* ── Q3 折線圖：斜率最陡＝增加最多 ────────────────────────────────────
   承接第二關：R2-2 選過「哪段斜率最陡」
   謊言：數值最高的月份（6月65萬）說「那段增加最快」
         但 3→4月 +20 才是增加最多的段
──────────────────────────────────────────────────────────────────────── */
(()=>{
  const labels=['1月','2月','3月','4月','5月','6月'];
  const vals=[20,35,30,50,45,65];
  // 差值：+15, -5, +20, -5, +20（3→4月和5→6月各+20，但6月數值最高）
  return {
    type:'line', typeLabel:'折線圖', diff:'med',
    data:{labels,vals,unit:'萬人',subject:'App下載數'},
    hint:'💡 折線最陡的段才是增加最多，不是數值最高的那個月份。',
    suspects:[
      {name:'小郁',role:'分析師',truth:true,
       text:'3月→4月增加了 20 萬（50−30），5月→6月也增加了 20 萬，這兩段是增加最多的。'},
      {name:'阿國',role:'研究員',truth:true,
       text:'2月→3月下降了 5 萬、4月→5月也下降了 5 萬，折線並非持續上升。'},
      {name:'小潔',role:'記者',liar:true,
       text:'6月下載數最高（65萬），所以5月到6月這段是整條折線中斜率最陡、增加最快的一段。'},
    ],
    explanation:'5→6月增加 65−45＝20 萬，但 3→4月也增加 50−30＝20 萬，並列增加最多。6月數值最高不等於那段增加最快。'
  };
})(),

/* ── Q4 雙折線圖：交叉點判斷 ──────────────────────────────────────────
   承接概念：最後段領先不等於全程領先
   謊言：第5週A組65分高於B組45分，說A組全程都領先
──────────────────────────────────────────────────────────────────────── */
(()=>{
  const labels=['第1週','第2週','第3週','第4週','第5週'];
  const vA=[40,35,45,55,65];
  const vB=[60,65,55,50,45];
  return {
    type:'dualline', typeLabel:'雙折線圖', diff:'med',
    data:{labels,valsA:vA,valsB:vB,lineA:'A組',lineB:'B組',unit:'分',subject:'練習成績'},
    hint:'💡 兩條折線有交叉就代表領先關係改變過，最後結果不等於全程都如此。',
    suspects:[
      {name:'阿文',role:'教練',truth:true,
       text:'第1、2週 B組（60、65分）領先 A組（40、35分），第3週交叉，之後 A組反超。'},
      {name:'小慧',role:'裁判',truth:true,
       text:'A組從 40 分進步到 65 分，B組從 60 分退步到 45 分，兩組走勢完全相反。'},
      {name:'大壯',role:'隊長',liar:true,
       text:'第5週 A組 65 分，高於 B組 45 分，所以 A組這五週全程都比 B組表現好。'},
    ],
    explanation:'前兩週 B組（60、65）都高於 A組（40、35），A組並非「全程」領先，大壯只看最後一週的結果。'
  };
})(),

/* ── Q5 直方圖：60分以下有幾人 ────────────────────────────────────────
   承接第二關：R2-3 算過「60分以下＝前三組加總」
   謊言：「60–80組有30人是最多」就說「超過一半的人在這組」
         （30/90≈33%，未超過一半）
──────────────────────────────────────────────────────────────────────── */
(()=>{
  const groups=['0–20','20–40','40–60','60–80','80–100'];
  const vals=[5,15,25,30,15]; // 合計90人，60分以下：5+15+25=45人（恰好一半）
  const total=vals.reduce((a,b)=>a+b,0);
  const below60=vals[0]+vals[1]+vals[2]; // 45人
  return {
    type:'hist', typeLabel:'直方圖', diff:'med',
    data:{groups,vals,subject:'測驗分數',unit:'分',step:20},
    hint:'💡 60分以下包含「0–20」「20–40」「40–60」三組，要把三組人數加起來。',
    suspects:[
      {name:'阿花',role:'統計員',truth:true,
       text:'60分以下有三組：「0–20」5人＋「20–40」15人＋「40–60」25人，合計 45 人。'},
      {name:'大明',role:'老師',truth:true,
       text:'「60–80」組 30 人是五組中最多的，佔全體 90 人的 33%，並未超過一半。'},
      {name:'小芳',role:'同學',liar:true,
       text:'「60–80」這組人數最多（30人），代表超過一半的人分數都在 60 到 80 之間。'},
    ],
    explanation:'「60–80」組 30 人，佔全體 90 人的 33%，並未超過 50%。小芳說「超過一半」是錯的。'
  };
})(),

/* ── Q6 平均數：極端值使平均數偏高 ────────────────────────────────────
   承接第二關：R2-5 算過平均數
   數字全為5的倍數，加入一個極端值95
   謊言：「平均數61.1分能代表大多數人的水準」
──────────────────────────────────────────────────────────────────────── */
(()=>{
  const data=[55,60,50,70,60,65,50,45,95];
  const sorted=[45,50,50,55,60,60,65,70,95];
  const n=9, outlier=95;
  const sum=data.reduce((a,b)=>a+b,0); // 550
  const mean=+(sum/n).toFixed(1);       // 61.1
  const realMedian=sorted[4];           // 60
  return {
    type:'stats', typeLabel:'平均數', diff:'hard',
    data:{data,sorted,mean,realMedian,outlier,n},
    hint:'💡 有極端值時，平均數被拉高，不能代表「大多數人」的水準。',
    suspects:[
      {name:'數學老師',role:'任課老師',liar:true,
       text:'這組 9 人的平均分數是 61.1 分，這個數字精準代表了大多數同學的成績水準。'},
      {name:'班長',role:'一年甲班',truth:true,
       text:'95 分是極端值，把平均數拉高到 61.1，但其他 8 人分數都在 45–70 之間，中位數 60 分更具代表性。'},
      {name:'小偉',role:'同學',truth:true,
       text:'平均數 61.1 的計算方式是對的，但因為有 95 這個極端值，所以它高估了多數人的水準。'},
    ],
    explanation:'平均數 61.1 被 95 分拉高，8 位同學的成績都在 45–70，平均數無法「精準代表大多數人」。中位數 60 才更合適。'
  };
})(),

/* ── Q7 列聯表：單列合計 vs 整體合計 ──────────────────────────────────
   承接第二關：R2-4 算過「橫向加總＝該列合計」
   數字全為5的倍數
   謊言：整體合計「雞排55份最多」→ 說「男生和女生都最喜歡雞排」
         但男生那列：排骨35 > 雞排25
──────────────────────────────────────────────────────────────────────── */
(()=>{
  const rows=['男生','女生'];
  const cols=['雞排便當','排骨便當','素食便當'];
  const cells=[[25,35,10],[30,10,10]];
  const rowTotals=[70,50];
  const colTotals=[55,45,20];
  const grandTotal=120;
  return {
    type:'table', typeLabel:'列聯表', diff:'med',
    data:{rows,cols,cells,rowTotals,colTotals,grandTotal},
    hint:'💡 要看「男生那一橫列」的數字，不能用整體合計來推論某個群體的喜好。',
    suspects:[
      {name:'營養師',role:'學校午餐組',truth:true,
       text:'男生那列：排骨 35 份 > 雞排 25 份，所以男生最喜歡的是排骨便當。'},
      {name:'小晴',role:'班級幹部',truth:true,
       text:'整體合計雞排 55 份最多，但這是男生 25 份加女生 30 份的結果，不代表男生最喜歡雞排。'},
      {name:'阿志',role:'總務股長',liar:true,
       text:'最下面合計列顯示雞排便當 55 份是三種便當中最多的，所以男生和女生都最喜歡雞排便當。'},
    ],
    explanation:'男生那列：排骨 35 > 雞排 25，男生最喜歡排骨便當。阿志只看合計列、忽略各列單項數字，是錯誤的。'
  };
})(),

/* ── Q8 眾數：出現最多次的類別名稱 ────────────────────────────────────
   承接第二關：R2-7 選過「眾數是品項名稱本身」
   數字全為5的倍數
   謊言：把「份數最多的數字40%」說成眾數
──────────────────────────────────────────────────────────────────────── */
(()=>{
  const items=['雞排便當','排骨便當','豬排便當','素食便當'];
  const counts=[20,10,15,5]; // 全部5的倍數，雞排20份最多
  const total=50;
  const pcts=[40,20,30,10];
  return {
    type:'mode', typeLabel:'眾數', diff:'hard',
    data:{items,counts,pcts,total,mode:'雞排便當',modeCount:20},
    hint:'💡 眾數是出現次數最多的「值本身」，答案是品項名稱，不是份數數字或百分比。',
    suspects:[
      {name:'老師',role:'導師',truth:true,
       text:'「雞排便當」訂了 20 份，比其他三種都多，所以眾數是「雞排便當」這個名稱。'},
      {name:'小芬',role:'同學',truth:true,
       text:'眾數是出現最多次的那個值本身，訂購最多的是「雞排便當」，所以眾數是「雞排便當」，不是數字 20。'},
      {name:'阿哲',role:'同學',liar:true,
       text:'「雞排便當」佔 40%，這個百分比最大，所以這次午餐的眾數是 40。'},
    ],
    explanation:'眾數是「雞排便當」這個品項名稱，不是它的份數（20）也不是百分比（40%）。阿哲把百分比當成眾數，概念完全錯誤。'
  };
})(),

  ]; // end return
}

/* ══════════════════════════════════════════════════════════════════════
   第二關：計算題（填空）
   題目隨機生成，數字皆為 5 的倍數
   每題：左側圖表或數據、右側問題 + 輸入框
   共 8 題，覆蓋各圖表讀值與統計數計算
══════════════════════════════════════════════════════════════════════ */

function makeR2Questions(){

  // ── 工具函式 ──
  const pick=arr=>arr[Math.floor(Math.random()*arr.length)];
  const rnd5=(lo,hi)=>{const b=Math.ceil(lo/5),t=Math.floor(hi/5);return(Math.floor(Math.random()*(t-b+1))+b)*5;};

  // ── 題庫工廠（每種圖表多個變體，question 完全不含數字）──

  /* ════ 圓餅圖（3 種）════ */
  const pie1=()=>{
    // 看圖：哪個扇形最大
    const pools=[['數學','國文','英文','自然','社會'],['籃球','足球','羽球','桌球','游泳'],['動作片','喜劇','動畫','劇情','科幻']];
    const cats=pick(pools);
    const pcts=[rnd5(30,45),rnd5(15,25),rnd5(10,20),rnd5(5,15),0];
    pcts[4]=100-pcts.slice(0,4).reduce((a,b)=>a+b,0);
    if(pcts[4]<5){pcts[0]-=5;pcts[4]=5;}
    const total=rnd5(2,4)*100;
    const vals=pcts.map(p=>Math.round(total*p/100));
    const maxI=pcts.indexOf(Math.max(...pcts));
    const correct=cats[maxI];
    const wrong=cats.filter((_,i)=>i!==maxI).sort(()=>Math.random()-0.5).slice(0,3);
    const opts=[correct,...wrong].sort(()=>Math.random()-0.5);
    return {type:'pie',typeLabel:'圓餅圖',chartData:{cats,vals,pcts,total},
      question:'觀察左側圓餅圖，哪個類別的<em>扇形最大</em>、佔比最高？',
      mcq:true,options:opts,correctOption:correct,answer:correct,unit:'',
      step:`「${correct}」的扇形最大，佔 ${pcts[maxI]}%`};
  };

  const pie2=()=>{
    // 看圖：哪個扇形超過一半（>50%）
    const pools=[['數學','國文','英文','自然','社會'],['籃球','足球','羽球','桌球','游泳']];
    const cats=pick(pools);
    const pcts=[rnd5(55,70),rnd5(10,20),rnd5(5,15),0,0];
    pcts[3]=rnd5(3,8)*1; pcts[4]=100-pcts[0]-pcts[1]-pcts[2]-pcts[3];
    if(pcts[4]<5){pcts[0]-=5;pcts[4]=5;}
    const total=rnd5(2,4)*100;
    const vals=pcts.map(p=>Math.round(total*p/100));
    const correct=cats[0];
    const wrong=cats.slice(1).sort(()=>Math.random()-0.5).slice(0,3);
    const opts=[correct,...wrong].sort(()=>Math.random()-0.5);
    return {type:'pie',typeLabel:'圓餅圖',chartData:{cats,vals,pcts,total},
      question:'觀察左側圓餅圖，哪個類別的扇形<em>超過一半</em>（大於50%）？',
      mcq:true,options:opts,correctOption:correct,answer:correct,unit:'',
      step:`「${correct}」佔 ${pcts[0]}%，超過 50%`};
  };

  const pie3=()=>{
    // 看圖：哪個扇形最小
    const cats=['數學','國文','英文','自然','社會'];
    const pcts=[rnd5(25,35),rnd5(20,30),rnd5(15,25),rnd5(10,20),0];
    pcts[4]=100-pcts.slice(0,4).reduce((a,b)=>a+b,0);
    if(pcts[4]<5){pcts[3]-=5;pcts[4]+=5;}
    const total=rnd5(2,4)*100;
    const vals=pcts.map(p=>Math.round(total*p/100));
    const minI=pcts.indexOf(Math.min(...pcts));
    const correct=cats[minI];
    const wrong=cats.filter((_,i)=>i!==minI).sort(()=>Math.random()-0.5).slice(0,3);
    const opts=[correct,...wrong].sort(()=>Math.random()-0.5);
    return {type:'pie',typeLabel:'圓餅圖',chartData:{cats,vals,pcts,total},
      question:'觀察左側圓餅圖，哪個類別的<em>扇形最小</em>、佔比最低？',
      mcq:true,options:opts,correctOption:correct,answer:correct,unit:'',
      step:`「${correct}」的扇形最小，佔 ${pcts[minI]}%`};
  };

  /* ════ 長條圖（3 種）════ */
  const bar1=()=>{
    // 哪類最多（MCQ）— 確保唯一最大
    const ctxPool=[
      {labels:['籃球','足球','羽球','桌球','游泳'],subject:'社團人數',unit:'人'},
      {labels:['甲班','乙班','丙班','丁班','戊班'],subject:'得獎人數',unit:'人'},
      {labels:['蘋果','香蕉','芒果','葡萄','草莓'],subject:'水果銷售',unit:'份'},
    ];
    const c=pick(ctxPool);
    let vals;
    do{vals=c.labels.map(()=>rnd5(10,80));}while(vals.filter(v=>v===Math.max(...vals)).length>1);
    const maxI=vals.indexOf(Math.max(...vals));
    const opts=[c.labels[maxI],...c.labels.filter((_,i)=>i!==maxI).sort(()=>Math.random()-0.5).slice(0,3)].sort(()=>Math.random()-0.5);
    return {type:'bar',typeLabel:'長條圖',chartData:{labels:c.labels,vals,unit:c.unit,subject:c.subject},
      question:`觀察左側長條圖，哪個類別的<em>長條最高</em>、數量最多？`,
      mcq:true,options:opts,correctOption:c.labels[maxI],answer:c.labels[maxI],unit:'',
      step:`「${c.labels[maxI]}」的長條最高，共 ${vals[maxI]} ${c.unit}`};
  };

  const bar2=()=>{
    // 兩類相差（輸入，不給數字）
    const ctxPool=[
      {labels:['籃球','足球','羽球','桌球','游泳'],subject:'社團人數',unit:'人',q0:'「籃球」',q1:'「足球」'},
      {labels:['甲班','乙班','丙班','丁班','戊班'],subject:'得獎人數',unit:'人',q0:'「甲班」',q1:'「乙班」'},
      {labels:['蘋果','香蕉','芒果','葡萄','草莓'],subject:'水果銷售',unit:'份',q0:'「蘋果」',q1:'「香蕉」'},
    ];
    const c=pick(ctxPool);
    const a=rnd5(40,80),b=rnd5(10,35);
    const rest=Array.from({length:c.labels.length-2},()=>rnd5(15,60));
    const vals=[a,b,...rest];
    return {type:'bar',typeLabel:'長條圖',chartData:{labels:c.labels,vals,unit:c.unit,subject:c.subject},
      question:`觀察左側長條圖，${c.q0}和${c.q1}的${c.subject}相差幾${c.unit}？`,
      answer:a-b,unit:c.unit,
      step:`${c.labels[0]} ${a}${c.unit} − ${c.labels[1]} ${b}${c.unit} = <strong>${a-b} ${c.unit}</strong>`};
  };

  const bar3=()=>{
    // 哪類最少（MCQ）— 確保唯一最小
    const ctxPool=[
      {labels:['籃球','足球','羽球','桌球','游泳'],subject:'社團人數',unit:'人'},
      {labels:['一月','二月','三月','四月','五月'],subject:'銷售量',unit:'件'},
    ];
    const c=pick(ctxPool);
    let vals;
    do{vals=c.labels.map(()=>rnd5(10,80));}while(vals.filter(v=>v===Math.min(...vals)).length>1);
    const minI=vals.indexOf(Math.min(...vals));
    const opts=[c.labels[minI],...c.labels.filter((_,i)=>i!==minI).sort(()=>Math.random()-0.5).slice(0,3)].sort(()=>Math.random()-0.5);
    return {type:'bar',typeLabel:'長條圖',chartData:{labels:c.labels,vals,unit:c.unit,subject:c.subject},
      question:`觀察左側長條圖，哪個類別的<em>長條最矮</em>、數量最少？`,
      mcq:true,options:opts,correctOption:c.labels[minI],answer:c.labels[minI],unit:'',
      step:`「${c.labels[minI]}」的長條最矮，共 ${vals[minI]} ${c.unit}`};
  };

  /* ════ 折線圖（3 種）════ */
  const makeLineData=(n=6)=>{
    const labelPool=[['1月','2月','3月','4月','5月','6月'],['一月','二月','三月','四月','五月','六月'],['第1週','第2週','第3週','第4週','第5週','第6週']];
    return pick(labelPool).slice(0,n);
  };

  const line1=()=>{
    // 斜率最陡段（MCQ）
    const labels=makeLineData();
    const bigSeg=Math.floor(Math.random()*(labels.length-1));
    const bigJump=rnd5(20,35);
    const vals=[rnd5(15,30)];
    for(let i=1;i<labels.length;i++){
      vals.push(i-1===bigSeg?vals[i-1]+bigJump:Math.max(5,vals[i-1]+[-10,-5,0,5][Math.floor(Math.random()*4)]));
    }
    const diffs=vals.slice(1).map((v,i)=>v-vals[i]);
    const correct=`${labels[bigSeg]} → ${labels[bigSeg+1]}`;
    const wrongs=[...labels.keys()].filter(i=>i!==bigSeg).sort(()=>Math.random()-0.5).slice(0,3)
      .map(i=>`${labels[i]} → ${labels[i+1]}`);
    const opts=[correct,...wrongs].sort(()=>Math.random()-0.5);
    return {type:'line',typeLabel:'折線圖',chartData:{labels,vals,unit:'萬人',subject:'用戶數'},
      question:'觀察左側折線圖，哪一段的<em>斜率最陡</em>、數值增加最多？',
      mcq:true,options:opts,correctOption:correct,answer:correct,unit:'',
      step:`各段差值：${diffs.map((d,i)=>`${labels[i]}→${labels[i+1]}：${d>0?'+':''}${d}`).join('、')}。最陡：<strong>${correct}</strong>`};
  };

  const line2=()=>{
    // 哪段有下降（MCQ）
    const labels=makeLineData();
    const downSeg=Math.floor(Math.random()*(labels.length-1));
    const vals=[rnd5(30,50)];
    for(let i=1;i<labels.length;i++){
      vals.push(i-1===downSeg?Math.max(5,vals[i-1]-rnd5(10,20)):vals[i-1]+rnd5(5,15));
    }
    const diffs=vals.slice(1).map((v,i)=>v-vals[i]);
    const correct=`${labels[downSeg]} → ${labels[downSeg+1]}`;
    const wrongs=[...labels.keys()].filter(i=>i!==downSeg&&diffs[i]>0).sort(()=>Math.random()-0.5).slice(0,3)
      .map(i=>`${labels[i]} → ${labels[i+1]}`);
    const opts=[correct,...wrongs].sort(()=>Math.random()-0.5);
    return {type:'line',typeLabel:'折線圖',chartData:{labels,vals,unit:'萬人',subject:'用戶數'},
      question:'觀察左側折線圖，哪一段的折線<em>往下走</em>、數值減少？',
      mcq:true,options:opts,correctOption:correct,answer:correct,unit:'',
      step:`${labels[downSeg]}→${labels[downSeg+1]} 數值下降（差值${diffs[downSeg]}），是唯一下降的段`};
  };

  const line3=()=>{
    // 最高點在哪個時間（MCQ）
    const labels=makeLineData();
    const vals=labels.map(()=>rnd5(15,70));
    const maxI=vals.indexOf(Math.max(...vals));
    const correct=labels[maxI];
    const wrongs=labels.filter((_,i)=>i!==maxI).sort(()=>Math.random()-0.5).slice(0,3);
    const opts=[correct,...wrongs].sort(()=>Math.random()-0.5);
    return {type:'line',typeLabel:'折線圖',chartData:{labels,vals,unit:'萬人',subject:'用戶數'},
      question:'觀察左側折線圖，哪個時間點的數值<em>最高</em>？',
      mcq:true,options:opts,correctOption:correct,answer:correct,unit:'',
      step:`「${correct}」的折線點最高，數值為 ${vals[maxI]} 萬人`};
  };

  /* ════ 直方圖（3 種）════ */
  const hist1=()=>{
    // 60分以下共幾人（輸入）
    const groups=['0–20','20–40','40–60','60–80','80–100'];
    const vals=[rnd5(5,15),rnd5(10,20),rnd5(15,30),rnd5(20,35),rnd5(10,20)];
    const ans=vals[0]+vals[1]+vals[2];
    return {type:'hist',typeLabel:'直方圖',chartData:{groups,vals,subject:'測驗分數',unit:'分',step:20},
      question:'觀察左側直方圖，<em>60分以下</em>（未達60分）共有幾人？',
      answer:ans,unit:'人',
      step:`「0–20」${vals[0]}人＋「20–40」${vals[1]}人＋「40–60」${vals[2]}人 = <strong>${ans} 人</strong>`};
  };

  const hist2=()=>{
    // 哪組最多（MCQ）— 確保最大值唯一
    const groups=['0–20','20–40','40–60','60–80','80–100'];
    let vals;
    do {
      vals=groups.map(()=>rnd5(5,35));
      // 確保最大值只有一組
      const maxV=Math.max(...vals);
      const maxCount=vals.filter(v=>v===maxV).length;
      if(maxCount===1) break;
    } while(true);
    const maxI=vals.indexOf(Math.max(...vals));
    const opts=[groups[maxI],...groups.filter((_,i)=>i!==maxI).sort(()=>Math.random()-0.5).slice(0,3)].sort(()=>Math.random()-0.5);
    return {type:'hist',typeLabel:'直方圖',chartData:{groups,vals,subject:'測驗分數',unit:'分',step:20},
      question:'觀察左側直方圖，哪個分數範圍的人數<em>最多</em>？',
      mcq:true,options:opts,correctOption:groups[maxI],answer:groups[maxI],unit:'',
      step:`「${groups[maxI]}」這組最多，共 ${vals[maxI]} 人`};
  };

  const hist3=()=>{
    // 60分以上共幾人（輸入）
    const groups=['0–20','20–40','40–60','60–80','80–100'];
    const vals=[rnd5(5,15),rnd5(10,20),rnd5(15,30),rnd5(20,35),rnd5(10,20)];
    const ans=vals[3]+vals[4];
    return {type:'hist',typeLabel:'直方圖',chartData:{groups,vals,subject:'測驗分數',unit:'分',step:20},
      question:'觀察左側直方圖，<em>60分以上</em>（含60分）共有幾人？',
      answer:ans,unit:'人',
      step:`「60–80」${vals[3]}人＋「80–100」${vals[4]}人 = <strong>${ans} 人</strong>`};
  };

  /* ════ 列聯表（3 種）════ */
  const makeTableData=()=>{
    let cells,rowTotals;
    do{
      cells=[[rnd5(15,40),rnd5(10,30),rnd5(5,15)],[rnd5(10,30),rnd5(15,35),rnd5(5,15)]];
      rowTotals=cells.map(r=>r.reduce((a,b)=>a+b,0));
    }while(rowTotals[0]===rowTotals[1]);
    const colTotals=[0,1,2].map(ci=>cells.reduce((s,r)=>s+r[ci],0));
    const grand=rowTotals.reduce((a,b)=>a+b,0);
    return {rows:['男生','女生'],cols:['雞排便當','排骨便當','素食便當'],cells,rowTotals,colTotals,grandTotal:grand};
  };

  const table1=()=>{
    const d=makeTableData();
    return {type:'table',typeLabel:'列聯表',chartData:d,
      question:'觀察左側列聯表，<em>男生</em>共訂了幾份便當？',
      answer:d.rowTotals[0],unit:'份',
      step:`男生各欄相加 = <strong>${d.rowTotals[0]} 份</strong>（右側男生合計欄）`};
  };

  const table2=()=>{
    const d=makeTableData();
    return {type:'table',typeLabel:'列聯表',chartData:d,
      question:'觀察左側列聯表，訂「<em>雞排便當</em>」的男女合計共幾份？',
      answer:d.colTotals[0],unit:'份',
      step:`男生 ${d.cells[0][0]} ＋ 女生 ${d.cells[1][0]} = <strong>${d.colTotals[0]} 份</strong>（最下方雞排合計）`};
  };

  const table3=()=>{
    const d=makeTableData();
    return {type:'table',typeLabel:'列聯表',chartData:d,
      question:'觀察左側列聯表，全部同學共訂了幾份便當？',
      answer:d.grandTotal,unit:'份',
      step:`全部合計 = <strong>${d.grandTotal} 份</strong>（表格右下角總計）`};
  };

  /* ════ 平均數（積木圖，2 種）════ */
  const mean1=()=>{
    const n=5;
    let data,sum,ans;
    do{data=Array.from({length:n},()=>rnd5(30,80));sum=data.reduce((a,b)=>a+b,0);}while(sum%n!==0);
    ans=sum/n;
    const offsets=[10,15,20,-10,-15].filter(o=>ans+o>0&&ans+o<100).sort(()=>Math.random()-0.5);
    const opts=[ans,...offsets.slice(0,3).map(o=>ans+o)].sort(()=>Math.random()-0.5).map(v=>`${v} 分`);
    return {type:'mean_blocks',typeLabel:'平均數',blockData:data,chartData:null,
      question:'觀察右側積木圖，若把所有積木<em>堆平</em>成一樣高，每根是幾分？',
      mcq:true,options:opts,correctOption:`${ans} 分`,answer:ans,unit:'分',
      step:`（${data.join(' ＋ ')}）÷ ${n} = ${sum} ÷ ${n} = <strong>${ans} 分</strong>`};
  };

  const mean2=()=>{
    // n=4，更簡單
    const n=4;
    let data,sum,ans;
    do{data=Array.from({length:n},()=>rnd5(20,80));sum=data.reduce((a,b)=>a+b,0);}while(sum%n!==0);
    ans=sum/n;
    const offsets=[5,10,15,-5,-10].filter(o=>ans+o>0&&ans+o<100).sort(()=>Math.random()-0.5);
    const opts=[ans,...offsets.slice(0,3).map(o=>ans+o)].sort(()=>Math.random()-0.5).map(v=>`${v} 分`);
    return {type:'mean_blocks',typeLabel:'平均數',blockData:data,chartData:null,
      question:'觀察右側積木圖，把積木<em>堆平</em>後，平均高度是幾分？',
      mcq:true,options:opts,correctOption:`${ans} 分`,answer:ans,unit:'分',
      step:`（${data.join(' ＋ ')}）÷ ${n} = ${sum} ÷ ${n} = <strong>${ans} 分</strong>`};
  };

  /* ════ 中位數（輸入，2 種）════ */
  const median1=()=>{
    const n=7;
    const data=Array.from({length:n},()=>rnd5(30,90));
    const sorted=[...data].sort((a,b)=>a-b);
    const midIdx=Math.floor(n/2);
    const ans=sorted[midIdx];
    return {type:'median_input',typeLabel:'中位數（奇數）',rawData:data,sortedData:sorted,midIdx,midPair:null,chartData:null,
      question:'觀察下方排列好的數字，請輸入<em>中位數</em>（正中間那個數）。',
      answer:ans,unit:'分',
      step:`排序後：${sorted.map((v,i)=>i===midIdx?`<strong style="color:#f0c560">[${v}]</strong>`:v).join('、')}　→　第 ${midIdx+1} 個 = <strong>${ans} 分</strong>`};
  };

  const median2=()=>{
    const n=8;
    let data,sorted,ans;
    do{
      data=Array.from({length:n},()=>rnd5(30,90));
      sorted=[...data].sort((a,b)=>a-b);
      ans=(sorted[n/2-1]+sorted[n/2])/2;
    }while(ans%1!==0);
    const m1=sorted[n/2-1],m2=sorted[n/2];
    return {type:'median_input',typeLabel:'中位數（偶數）',rawData:data,sortedData:sorted,midIdx:-1,midPair:[n/2-1,n/2],chartData:null,
      question:'觀察下方排列好的數字（偶數個），請輸入<em>中位數</em>（中間兩數的平均）。',
      answer:ans,unit:'分',
      step:`排序後第 ${n/2}、${n/2+1} 個：${m1}、${m2} → (${m1}＋${m2})÷2 = <strong>${ans} 分</strong>`};
  };

  /* ════ 眾數（長條圖，MCQ，2 種）════ */
  const mode1=()=>{
    const items=['雞排便當','排骨便當','豬排便當','素食便當'];
    const modeCount=rnd5(20,35);
    const counts=[modeCount,rnd5(5,15),rnd5(5,15),rnd5(5,10)];
    const total=counts.reduce((a,b)=>a+b,0);
    const opts=[
      {text:`「${items[0]}」`,correct:true},
      {text:`${modeCount}（份數）`,correct:false},
      {text:`「${items[1]}」`,correct:false},
      {text:`${total}（全部合計）`,correct:false},
    ].sort(()=>Math.random()-0.5);
    return {type:'mode_bar',typeLabel:'眾數',chartData:{labels:items,vals:counts,unit:'份',subject:'便當訂購'},
      question:'觀察左側長條圖，這份資料的<em>眾數</em>是什麼？',
      mcq:true,options:opts.map(o=>o.text),correctOption:opts.find(o=>o.correct).text,
      answer:items[0],unit:'',
      step:`「${items[0]}」長條最高（${modeCount}份），眾數是品項名稱本身：<strong>「${items[0]}」</strong>`};
  };

  const mode2=()=>{
    // 不同品項名稱，眾數在第2位
    const items=['豬排便當','雞排便當','排骨便當','素食便當'];
    const modeCount=rnd5(20,35);
    const counts=[rnd5(5,15),modeCount,rnd5(5,15),rnd5(5,10)];
    const total=counts.reduce((a,b)=>a+b,0);
    const opts=[
      {text:`「${items[1]}」`,correct:true},
      {text:`「${items[0]}」`,correct:false},
      {text:`${modeCount}（份數）`,correct:false},
      {text:`${total}（全部合計）`,correct:false},
    ].sort(()=>Math.random()-0.5);
    return {type:'mode_bar',typeLabel:'眾數',chartData:{labels:items,vals:counts,unit:'份',subject:'便當訂購'},
      question:'觀察左側長條圖，哪個品項是這份資料的<em>眾數</em>？',
      mcq:true,options:opts.map(o=>o.text),correctOption:opts.find(o=>o.correct).text,
      answer:items[1],unit:'',
      step:`「${items[1]}」長條最高（${modeCount}份），眾數是：<strong>「${items[1]}」</strong>`};
  };

  /* ════ 組成 15 題（每種圖表至少 1 題，隨機多抽 3 題補足）════ */
  const mandatory=[
    pie1(), pie2(),
    bar1(), bar2(),
    line1(), line2(),
    hist1(), hist2(),
    table1(), table2(),
    mean1(),
    median1(), median2(),
    mode1(), mode2(),
  ];
  // 隨機打亂後取 15 題
  return mandatory.sort(()=>Math.random()-0.5);
}

const LB_R2_KEY='detective_lb_r2_v1';
function loadLBR2(){try{return JSON.parse(localStorage.getItem(LB_R2_KEY))||[];}catch{return[];}}
function saveLBR2(lb){try{localStorage.setItem(LB_R2_KEY,JSON.stringify(lb));}catch{}}
function addToLBR2(name,score,correct,total){
  const lb=loadLBR2();
  lb.push({name,score,correct,total,date:new Date().toLocaleDateString('zh-TW')});
  lb.sort((a,b)=>b.score-a.score);
  if(lb.length>20)lb.length=20;
  saveLBR2(lb);
  return lb;
}
function renderLBR2(containerId, myScore){
  const lb=loadLBR2();
  const el=document.getElementById(containerId);
  if(!el)return;
  if(!lb.length){el.innerHTML='<div class="lb-empty">尚無計算記錄，成為第一位！</div>';return;}
  const medals=['🥇','🥈','🥉'];
  const rankClasses=['gold','silver','bronze'];
  el.innerHTML=lb.map((r,i)=>{
    const isMe=(r.score===myScore&&i===lb.findIndex(x=>x.score===myScore));
    return `<div class="lb-row${isMe?' me':''}">
      <span class="lb-rank ${rankClasses[i]||''}">${medals[i]||i+1}</span>
      <span class="lb-name">${r.name}</span>
      <span class="lb-score">${r.score}</span>
      <span class="lb-meta">${r.correct}/${r.total}題 · ${r.date}</span>
    </div>`;
  }).join('');
}

let G2={};

function startR2(){
  clearInterval(G2&&G2.timerID);
  const name=(G&&G.playerName)||(G1&&G1.playerName)||window._playerName||'匿名偵探';
  G2={
    qIdx:0, score:0, correct:0,
    timeLeft:R2_TIME, timerID:null, answered:false,
    qs:makeR2Questions(),
    playerName:name
  };
  document.getElementById('b-stage').textContent='第二關';
  document.getElementById('b-streak').style.display='none';
  renderR2Dots();
  renderR2Q();
}

function renderR2Dots(){
  const row=document.getElementById('prog-row');
  row.innerHTML='<span class="prog-lbl">進度</span>';
  for(let i=0;i<G2.qs.length;i++){
    const d=document.createElement('div');
    d.className='pdot'+(i<G2.qIdx?' done':i===G2.qIdx?' cur':'');
    row.appendChild(d);
  }
  document.getElementById('b-score').textContent=G2.score+' 分';
}

function startR2Timer(){
  const box=document.getElementById('timer-box');
  function tick(){
    const t=G2.timeLeft;
    const m=Math.floor(t/60),s=t%60;
    box.textContent=m+':'+(s<10?'0':'')+s;
    box.className='timer-box'+(t<=60?' danger':t<=120?' warn':'');
    if(t<=0){clearInterval(G2.timerID);finishR2();}
    G2.timeLeft--;
  }
  tick();
  G2.timerID=setInterval(tick,1000);
}

function renderR2Q(){
  if(G2.qIdx>=G2.qs.length){finishR2();return;}
  G2.answered=false;
  clearInterval(G2.timerID);
  G2.timeLeft=R2_TIME; // 每題重設60秒
  const q=G2.qs[G2.qIdx];
  document.getElementById('b-type').textContent=q.typeLabel;
  renderR2Dots();

  const area=document.getElementById('game-area');
  const wrap=document.createElement('div');
  wrap.className='calc-question';

  // Data chips for rawData questions (not median_input - has its own display)
  let dataSection='';
  if(q.rawData && q.type!=='median_input'){
    dataSection=`<div class="data-display" id="r2-data">`
      +q.rawData.map(v=>`<span class="data-num">${v}</span>`).join('')
      +'</div>';
  }

  // median_input: show unsorted + sorted, NO highlighting (student must find middle)
  let medianSection='';
  if(q.type==='median_input'){
    const isPair=q.midPair!=null;
    const n=q.sortedData.length;
    medianSection=`
      <div style="margin-bottom:14px">
        <div style="font-size:12px;color:var(--text3);letter-spacing:1px;margin-bottom:7px">原始數字（未排序）</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">
          ${q.rawData.map(v=>`<span class="data-num">${v}</span>`).join('')}
        </div>
        <div style="font-size:12px;color:var(--text3);letter-spacing:1px;margin-bottom:7px">由小到大排列後（共 ${n} 個）</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${q.sortedData.map((v,i)=>`<span class="data-num">${v}</span>`).join('')}
        </div>
        ${isPair
          ?`<div style="font-size:12px;color:var(--text2);margin-top:8px">💡 偶數個資料：中位數 ＝ 中間兩個數相加 ÷ 2</div>`
          :`<div style="font-size:12px;color:var(--text2);margin-top:8px">💡 奇數個資料：找正中間那一個數</div>`}
      </div>`;
  }

  // mean_blocks: use canvas on left
  const showChart = !!q.chartData || q.type==='mean_blocks';

  wrap.innerHTML=`
    <div style="display:grid;grid-template-columns:${showChart?'40% 1fr':'1fr'};gap:14px;align-items:start">
      ${showChart?`
      <div class="calc-chart-wrap">
        <div class="ptitle" style="margin-bottom:10px">📊 ${q.typeLabel}</div>
        <canvas id="cv2"></canvas>
        ${q.type==='stats'?'<div class="drow" id="dc2"></div>':''}
      </div>`:''}
      <div class="calc-question-panel">
        <div class="ptitle"><span class="ptitle-dot"></span>計算題 · ${G2.qIdx+1}/${G2.qs.length}</div>
        ${dataSection}
        ${medianSection}
        <div class="calc-q-text">${q.question}</div>
        ${q.mcq
          ? `<div id="r2-opts" style="display:flex;flex-direction:column;gap:9px;margin-top:4px"></div>`
          : `<div class="calc-input-row">
               <input class="calc-input" id="r2-input" type="number" placeholder="輸入答案" autocomplete="off"/>
               ${q.unit?`<span class="calc-unit">${q.unit}</span>`:''}
               <button class="calc-submit" id="r2-submit">確認 →</button>
             </div>`
        }
        <div class="calc-fb" id="r2-fb"></div>
        <button class="next-btn" id="r2-nxt">${G2.qIdx===G2.qs.length-1?'查看結果 →':'下一題 →'}</button>
      </div>
    </div>`;
  area.innerHTML='';area.appendChild(wrap);

  // Draw chart
  if(showChart){
    setTimeout(()=>{
      const cv=document.getElementById('cv2');
      if(!cv)return;
      if(q.type==='mean_blocks'){
        // ── 積木堆疊圖：畫 5 根不同高度的積木柱 ──
        const dpr=window.devicePixelRatio||1;
        cv.width=cv.offsetWidth*dpr; cv.height=220*dpr;
        const ctx=cv.getContext('2d');
        ctx.scale(dpr,dpr);
        const W=cv.offsetWidth,H=220;
        ctx.clearRect(0,0,W,H);
        const blocks=q.blockData;
        const maxV=Math.max(...blocks);
        const pad={t:20,r:10,b:40,l:30};
        const bw=(W-pad.l-pad.r)/blocks.length;
        const bp=bw*0.15;
        // grid lines
        [0,Math.round(maxV/2),maxV].forEach(v=>{
          const y=pad.t+(1-v/maxV)*(H-pad.t-pad.b);
          ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=0.5;
          ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
          ctx.fillStyle='rgba(175,170,163,0.7)';ctx.font=`9px 'Noto Sans TC'`;
          ctx.textAlign='right';ctx.fillText(v,pad.l-3,y+3);
        });
        blocks.forEach((v,i)=>{
          const bh=(v/maxV)*(H-pad.t-pad.b);
          const bx=pad.l+i*bw+bp;
          const by=pad.t+(H-pad.t-pad.b)-bh;
          const bwi=bw-bp*2;
          // 積木顏色
          const cols=['#4a90d9','#3db87a','#d4a843','#8b6fd4','#d95050'];
          ctx.fillStyle=cols[i]+'cc';
          // 畫有圓角的積木
          ctx.beginPath();
          ctx.moveTo(bx+3,by);ctx.lineTo(bx+bwi-3,by);
          ctx.quadraticCurveTo(bx+bwi,by,bx+bwi,by+3);
          ctx.lineTo(bx+bwi,by+bh);ctx.lineTo(bx,by+bh);
          ctx.lineTo(bx,by+3);ctx.quadraticCurveTo(bx,by,bx+3,by);
          ctx.fill();
          // 格線（積木磚塊感）
          const brickH=10;
          ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=0.5;
          for(let y2=by+brickH;y2<by+bh;y2+=brickH){
            ctx.beginPath();ctx.moveTo(bx,y2);ctx.lineTo(bx+bwi,y2);ctx.stroke();
          }
          // 數值標籤
          ctx.fillStyle='rgba(220,215,208,0.9)';ctx.font=`bold 11px 'Noto Sans TC'`;
          ctx.textAlign='center';ctx.fillText(v,bx+bwi/2,by-5);
          // X軸標籤
          ctx.fillStyle='rgba(175,170,163,0.7)';ctx.font=`10px 'Noto Sans TC'`;
          ctx.fillText(`第${i+1}人`,bx+bwi/2,H-5);
        });
        // 底線
        ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(pad.l,pad.t+(H-pad.t-pad.b));ctx.lineTo(W-pad.r,pad.t+(H-pad.t-pad.b));ctx.stroke();
      } else if(q.type==='mode_bar'){
        drawChart(cv,{type:'bar',typeLabel:q.typeLabel,data:q.chartData});
      } else {
        drawChart(cv,{type:q.type,typeLabel:q.typeLabel,data:q.chartData});
      }
      if(q.type==='stats'&&q.chartData){
        const dc=document.getElementById('dc2');
        if(dc) q.chartData.data.forEach(v=>{
          const c=document.createElement('span');
          c.className='dchip'+(v===q.chartData.outlier?' out':'');
          c.textContent=v;dc.appendChild(c);
        });
      }
    },50);
  }

  // median_visual: clickable sorted cells
  if(q.type==='median_visual'){
    setTimeout(()=>{
      q.sortedData.forEach((_,i)=>{
        const el=document.getElementById(`sv-${i}`);
        if(!el)return;
        el.addEventListener('mouseenter',()=>{if(!G2.answered)el.style.borderColor='rgba(212,168,67,.6)';el.style.transform='scale(1.1)';});
        el.addEventListener('mouseleave',()=>{if(!G2.answered&&i!==q.midIdx){el.style.borderColor='';el.style.transform='';}});
        el.addEventListener('click',()=>{
          if(G2.answered)return;
          G2.answered=true;
          // Highlight all: mid=gold, others=dim
          q.sortedData.forEach((_,j)=>{
            const e=document.getElementById(`sv-${j}`);
            if(!e)return;
            e.style.cursor='default';
            if(j===q.midIdx){
              e.style.background='rgba(212,168,67,.25)';
              e.style.borderColor='rgba(212,168,67,.8)';
              e.style.color='#f0c560';
              e.style.fontWeight='700';
              e.style.transform='scale(1.15)';
            } else {
              e.style.opacity='0.45';
            }
          });
          const correct=(i===q.midIdx);
          const timePct=G2.timeLeft/R2_TIME;
          const basePt=150;
          const fb=document.getElementById('r2-fb');
          if(correct){
            G2.correct++;
            const timeBonus=Math.floor(timePct*basePt*0.4);
            G2.score+=basePt+timeBonus;
            fb.className='calc-fb show ok';
            fb.innerHTML=`✓ 正確！第 ${q.midIdx+1} 個數（${q.answer}分）就是中位數。${timeBonus>0?`<span style="color:var(--amber);font-size:12px"> ⚡ +${timeBonus}</span>`:''}<div class="calc-step">📐 ${q.step}</div>`;
          } else {
            fb.className='calc-fb show fail';
            fb.innerHTML=`✗ 中位數是第 ${q.midIdx+1} 個數：<strong>${q.answer}分</strong><div class="calc-step">📐 ${q.step}</div>`;
          }
          renderR2Dots();
          document.getElementById('r2-nxt').classList.add('show');
        });
      });
    },80);
  }

  const nxtBtn=document.getElementById('r2-nxt');

  if(q.mcq){
    // ── MCQ mode ──────────────────────────────────────
    const optsDiv=document.getElementById('r2-opts');
    q.options.forEach((opt,oi)=>{
      const btn=document.createElement('button');
      btn.className='mcq-btn';
      btn.innerHTML=`<span class="mcq-prefix">${'ＡＢＣＤ'[oi]}</span><span>${opt}</span>`;
      btn.addEventListener('click',()=>{
        if(G2.answered)return;
        G2.answered=true;
        optsDiv.querySelectorAll('button').forEach(b=>b.classList.add('locked-opt'));
        const correct=(opt===q.correctOption);
        q.options.forEach((o,oi2)=>{
          const b=optsDiv.querySelectorAll('button')[oi2];
          if(o===q.correctOption)b.classList.add('correct-opt');
          else if(oi===oi2&&!correct)b.classList.add('wrong-opt');
        });
        const timePct=G2.timeLeft/R2_TIME;
        const basePt=150;
        if(correct){
          G2.correct++;
          const timeBonus=Math.floor(timePct*basePt*0.4);
          G2.score+=basePt+timeBonus;
          const fb=document.getElementById('r2-fb');
          fb.className='calc-fb show ok';
          fb.innerHTML=`✓ 正確！${timeBonus>0?`<span style="color:var(--amber);font-size:12px">⚡ 速度加分 +${timeBonus}</span>`:''}<div class="calc-step">📐 ${q.step}</div>`;
        } else {
          const fb=document.getElementById('r2-fb');
          fb.className='calc-fb show fail';
          fb.innerHTML=`✗ 正確答案：<strong>${q.correctOption}</strong><div class="calc-step">📐 ${q.step}</div>`;
        }
        renderR2Dots();
        nxtBtn.classList.add('show');
      });
      optsDiv.appendChild(btn);
    });
  } else {
    // ── Input mode ─────────────────────────────────────
    const input=document.getElementById('r2-input');
    const submitBtn=document.getElementById('r2-submit');

    function submit(){
      if(G2.answered)return;
      const raw=input.value.trim();
      if(raw==='')return;
      G2.answered=true;
      submitBtn.disabled=true;
      input.readOnly=true;
      const userVal=parseFloat(raw);
      const tolerance=q.acceptRange||0;
      const correct=Math.abs(userVal-q.answer)<=tolerance;
      const timePct=G2.timeLeft/R2_TIME;
      const basePt=150;
      if(correct){
        G2.correct++;
        const timeBonus=Math.floor(timePct*basePt*0.4);
        G2.score+=basePt+timeBonus;
        input.classList.add('correct');
        const fb=document.getElementById('r2-fb');
        fb.className='calc-fb show ok';
        fb.innerHTML=`✓ 正確！${timeBonus>0?`<span style="color:var(--amber);font-size:12px">⚡ 速度加分 +${timeBonus}</span>`:''}<div class="calc-step">📐 ${q.step}</div>`;
      } else {
        input.classList.add('wrong');
        const fb=document.getElementById('r2-fb');
        fb.className='calc-fb show fail';
        fb.innerHTML=`✗ 答案是 <strong>${q.answer}${q.unit}</strong><div class="calc-step">📐 ${q.step}</div>`;
      }
      renderR2Dots();
      nxtBtn.classList.add('show');
    }
    submitBtn.addEventListener('click',submit);
    input.addEventListener('keydown',e=>{if(e.key==='Enter')submit();});
    setTimeout(()=>input.focus(),100);
  }

  nxtBtn.addEventListener('click',()=>{
    clearInterval(G2.timerID);G2.qIdx++;renderR2Q();
  });
  // 每題計時器
  G2.timerID=setInterval(()=>{
    G2.timeLeft--;
    const t=G2.timeLeft,m=Math.floor(t/60),s=t%60;
    const box=document.getElementById('timer-box');
    if(box){box.textContent=m+':'+(s<10?'0':'')+s;box.className='timer-box'+(t<=10?' danger':t<=20?' warn':'');}
    if(t<=0){
      clearInterval(G2.timerID);
      if(!G2.answered){G2.answered=true;const fb=document.getElementById('r2-fb');if(fb){fb.className='calc-fb show fail';fb.innerHTML='⏰ 時間到！';}const nb=document.getElementById('r2-nxt');if(nb)nb.classList.add('show');}
    }
  },1000);
  renderR2Dots();
}

/* ══════ CANVAS ══════ */
function drawChart(canvas,q){
  const dpr=window.devicePixelRatio||1;
  canvas.width=canvas.offsetWidth*dpr;
  canvas.height=220*dpr;
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  const W=canvas.offsetWidth,H=220;
  ctx.clearRect(0,0,W,H);
  const TC='rgba(175,170,163,0.75)';
  const GC='rgba(255,255,255,0.04)';
  const f=s=>`${s}px 'Noto Sans TC'`;

  function gridLines(pad,maxV,steps=4){
    for(let i=0;i<=steps;i++){
      const v=Math.round(maxV*i/steps);
      const y=pad.t+(1-i/steps)*(H-pad.t-pad.b);
      ctx.fillStyle=TC;ctx.font=f(9);ctx.textAlign='right';
      ctx.fillText(v,pad.l-4,y+3);
      ctx.beginPath();ctx.strokeStyle=GC;ctx.lineWidth=.5;
      ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    }
  }

  if(q.type==='pie'){
    const{cats,vals,pcts}=q.data;
    const tot=vals.reduce((a,b)=>a+b,0);
    let ang=-Math.PI/2;
    const cx=W/2,cy=H/2-10,r=Math.min(W*.34,H*.34);
    vals.forEach((v,i)=>{
      const sw=v/tot*2*Math.PI;
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,ang,ang+sw);
      ctx.fillStyle=COLORS[i%6];ctx.fill();
      ctx.strokeStyle='rgba(14,15,20,.7)';ctx.lineWidth=1.5;ctx.stroke();
      // 扇形內不顯示數字
      ang+=sw;
    });
    const lh=15,cols=3,lx0=4,ly0=H-Math.ceil(cats.length/cols)*lh-4;
    cats.forEach((c,i)=>{
      const col=i%cols,row=Math.floor(i/cols),lx=lx0+col*(W/cols),ly=ly0+row*lh;
      ctx.fillStyle=COLORS[i%6];ctx.beginPath();ctx.arc(lx+5,ly+5,3.5,0,2*Math.PI);ctx.fill();
      ctx.fillStyle=TC;ctx.font=f(10);ctx.textAlign='left';
      ctx.fillText(c,lx+12,ly+9);
    });

  }else if(q.type==='bar'){
    const{labels,vals}=q.data;
    const maxV=Math.max(...vals),pad={t:24,r:10,b:38,l:34};
    const bw=(W-pad.l-pad.r)/labels.length,bp=bw*.12;
    gridLines(pad,maxV);
    labels.forEach((l,i)=>{
      const bh=(vals[i]/maxV)*(H-pad.t-pad.b)*0.95;
      const bx=pad.l+i*bw+bp,by=pad.t+(H-pad.t-pad.b)-bh,bwi=bw-bp*2;
      ctx.fillStyle=COLORS[i%6]+'cc';
      ctx.beginPath();ctx.moveTo(bx+2,by);ctx.lineTo(bx+bwi-2,by);
      ctx.quadraticCurveTo(bx+bwi,by,bx+bwi,by+2);
      ctx.lineTo(bx+bwi,by+bh);ctx.lineTo(bx,by+bh);ctx.lineTo(bx,by+2);
      ctx.quadraticCurveTo(bx,by,bx+2,by);ctx.fill();
      ctx.fillStyle=TC;ctx.font=f(9);ctx.textAlign='center';ctx.fillText(l,pad.l+i*bw+bw/2,H-5);
      ctx.fillStyle='rgba(220,215,208,.85)';ctx.font=f(9);ctx.fillText(vals[i],pad.l+i*bw+bw/2,by-4);
    });

  }else if(q.type==='grouped'){
    const{groups,valsA,valsB,gA,gB}=q.data;
    const maxV=Math.max(...valsA,...valsB),pad={t:28,r:10,b:38,l:34};
    const gw=(W-pad.l-pad.r)/groups.length,bw=gw*.37,gap=gw*.05;
    gridLines(pad,maxV);
    groups.forEach((g,i)=>{
      const gx=pad.l+i*gw+gw*.06;
      [[valsA,'rgba(74,144,217,.85)'],[valsB,'rgba(61,184,122,.85)']].forEach(([vals,col],j)=>{
        const bh=(vals[i]/maxV)*(H-pad.t-pad.b)*0.95;
        const bx=gx+j*(bw+gap),by=pad.t+(H-pad.t-pad.b)-bh;
        ctx.fillStyle=col;
        ctx.beginPath();ctx.moveTo(bx+2,by);ctx.lineTo(bx+bw-2,by);
        ctx.quadraticCurveTo(bx+bw,by,bx+bw,by+2);
        ctx.lineTo(bx+bw,by+bh);ctx.lineTo(bx,by+bh);ctx.lineTo(bx,by+2);
        ctx.quadraticCurveTo(bx,by,bx+2,by);ctx.fill();
        ctx.fillStyle='rgba(220,215,208,.7)';ctx.font=f(8);ctx.textAlign='center';ctx.fillText(vals[i],bx+bw/2,by-3);
      });
      ctx.fillStyle=TC;ctx.font=f(9);ctx.textAlign='center';ctx.fillText(g,pad.l+i*gw+gw/2,H-5);
    });
    ctx.fillStyle='rgba(74,144,217,.85)';ctx.fillRect(W-68,6,10,8);
    ctx.fillStyle=TC;ctx.font=f(9);ctx.textAlign='left';ctx.fillText(gA,W-55,14);
    ctx.fillStyle='rgba(61,184,122,.85)';ctx.fillRect(W-68,19,10,8);
    ctx.fillStyle=TC;ctx.fillText(gB,W-55,27);

  }else if(q.type==='line'){
    const{labels,vals}=q.data;
    const maxV=Math.max(...vals)*1.12,minV=Math.min(...vals)*.88;
    const pad={t:24,r:12,b:38,l:34};
    const xSt=(W-pad.l-pad.r)/(labels.length-1);
    gridLines(pad,Math.max(...vals));
    const pts=vals.map((v,i)=>({
      x:pad.l+i*xSt,
      y:pad.t+(1-(v-minV)/(maxV-minV))*(H-pad.t-pad.b)
    }));
    // area
    ctx.beginPath();ctx.moveTo(pts[0].x,H-pad.b);
    pts.forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.lineTo(pts[pts.length-1].x,H-pad.b);ctx.closePath();
    ctx.fillStyle='rgba(74,144,217,.07)';ctx.fill();
    // line
    ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
    pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.strokeStyle='rgba(74,144,217,.9)';ctx.lineWidth=2;ctx.stroke();
    // dots + labels
    pts.forEach((p,i)=>{
      ctx.beginPath();ctx.arc(p.x,p.y,3.5,0,2*Math.PI);
      ctx.fillStyle='#4a90d9';ctx.fill();
      ctx.strokeStyle='rgba(14,15,20,.5)';ctx.lineWidth=1;ctx.stroke();
      ctx.fillStyle=TC;ctx.font=f(9);ctx.textAlign='center';ctx.fillText(labels[i],p.x,H-5);
      ctx.fillStyle='rgba(220,215,208,.85)';ctx.fillText(vals[i],p.x,p.y-8);
    });

  }else if(q.type==='dualline'){
    const{labels,valsA,valsB,lineA,lineB}=q.data;
    const all=[...valsA,...valsB];
    const maxV=Math.max(...all)*1.12,minV=Math.min(...all)*.88;
    const pad={t:28,r:12,b:38,l:34};
    const xSt=(W-pad.l-pad.r)/(labels.length-1);
    gridLines(pad,Math.max(...all));
    [[valsA,'rgba(74,144,217,.9)',0],[valsB,'rgba(61,184,122,.9)',1]].forEach(([vals,col,j])=>{
      const pts=vals.map((v,i)=>({
        x:pad.l+i*xSt,
        y:pad.t+(1-(v-minV)/(maxV-minV))*(H-pad.t-pad.b)
      }));
      ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
      pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
      ctx.strokeStyle=col;ctx.lineWidth=2;ctx.stroke();
      pts.forEach((p,i)=>{
        ctx.beginPath();ctx.arc(p.x,p.y,3,0,2*Math.PI);ctx.fillStyle=col;ctx.fill();
        ctx.fillStyle='rgba(220,215,208,.75)';ctx.font=f(8);ctx.textAlign='center';
        ctx.fillText(vals[i],p.x,p.y+(j===0?-8:5));
        if(j===0){ctx.fillStyle=TC;ctx.font=f(9);ctx.fillText(labels[i],p.x,H-5);}
      });
    });
    ctx.beginPath();ctx.moveTo(W-70,10);ctx.lineTo(W-57,10);ctx.strokeStyle='rgba(74,144,217,.9)';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle=TC;ctx.font=f(9);ctx.textAlign='left';ctx.fillText(lineA,W-54,14);
    ctx.beginPath();ctx.moveTo(W-70,22);ctx.lineTo(W-57,22);ctx.strokeStyle='rgba(61,184,122,.9)';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle=TC;ctx.fillText(lineB,W-54,26);

  }else if(q.type==='hist'){
    const{groups,vals}=q.data;
    const maxV=Math.max(...vals);
    const pad={t:28,r:10,b:42,l:36};
    const bw=(W-pad.l-pad.r)/groups.length;
    gridLines(pad,maxV,4);
    groups.forEach((g,i)=>{
      const bh=(vals[i]/maxV)*(H-pad.t-pad.b)*0.92;
      const by=pad.t+(H-pad.t-pad.b)-bh;
      const bx=pad.l+i*bw+1;
      const bwi=bw-2;
      // 統一藍色漸層，不標示哪組最多
      const grad=ctx.createLinearGradient(0,by,0,by+bh);
      grad.addColorStop(0,COLORS[i%6]+'dd');
      grad.addColorStop(1,COLORS[i%6]+'66');
      ctx.fillStyle=grad;
      ctx.fillRect(bx,by,bwi,bh);
      ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=0.5;
      ctx.strokeRect(bx,by,bwi,bh);
      // 組距標籤（X 軸）
      ctx.fillStyle=TC;ctx.font=f(9);ctx.textAlign='center';
      ctx.fillText(g,pad.l+i*bw+bw/2,H-5);
      // 數值標籤（長條頂部）
      ctx.fillStyle='rgba(200,196,188,0.85)';ctx.font=f(9);
      ctx.fillText(vals[i],pad.l+i*bw+bw/2,by-4);
    });

  }else if(q.type==='stats'){
    const{data,mean,realMedian,outlier}=q.data;
    const pad={t:40,r:18,b:50,l:18};
    const mn=Math.min(...data)-5,mx=Math.max(...data)+5;
    const sc=v=>(v-mn)/(mx-mn)*(W-pad.l-pad.r)+pad.l;
    ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(pad.l,H/2);ctx.lineTo(W-pad.r,H/2);ctx.stroke();
    data.forEach(v=>{
      const x=sc(v),isO=(v===outlier);
      ctx.beginPath();ctx.arc(x,H/2,isO?7:4.5,0,2*Math.PI);
      ctx.fillStyle=isO?'rgba(217,80,80,.9)':'rgba(74,144,217,.85)';ctx.fill();
      ctx.fillStyle=isO?'#e87070':'rgba(200,195,188,.75)';
      ctx.font=(isO?'bold ':'')+'10px \'Noto Sans TC\'';
      ctx.textAlign='center';ctx.fillText(v,x,H/2-(isO?17:13));
    });
    // mean line
    const mx2=sc(mean);
    ctx.beginPath();ctx.strokeStyle='rgba(61,184,122,.7)';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
    ctx.moveTo(mx2,H/2-22);ctx.lineTo(mx2,H/2+22);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#3db87a';ctx.font=f(9);ctx.textAlign='center';
    ctx.fillText('平均',mx2,H/2+32);ctx.fillText(mean,mx2,H/2+43);
    // median line
    const rx=sc(realMedian);
    ctx.beginPath();ctx.strokeStyle='rgba(139,111,212,.7)';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
    ctx.moveTo(rx,H/2-22);ctx.lineTo(rx,H/2+22);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#8b6fd4';ctx.font=f(9);ctx.textAlign='center';
    ctx.fillText('中位數',rx,H/2+32);ctx.fillText(realMedian,rx,H/2+43);
    ctx.fillStyle='#d95050';ctx.font=f(9);ctx.textAlign='left';ctx.fillText('● 極端值',6,15);
    ctx.fillStyle='#4a90d9';ctx.fillText('● 一般值',6,27);

  }else if(q.type==='table'){
    // ── 列聯表：文字格線表格 ──────────────────────────────────
    const{rows,cols,cells,rowTotals,colTotals,grandTotal}=q.data;
    // 版面：4欄（空白+3便當）×3列（2性別+合計），另加標題列
    const nCols=cols.length+2; // 空白 + 3品項 + 合計
    const nRows=rows.length+2; // 標題 + 2性別 + 合計
    const cw=W/nCols, rh=(H-10)/nRows;
    const startY=8;

    // 繪製格線
    ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=0.5;
    for(let r=0;r<=nRows;r++){
      ctx.beginPath();ctx.moveTo(0,startY+r*rh);ctx.lineTo(W,startY+r*rh);ctx.stroke();
    }
    for(let c=0;c<=nCols;c++){
      ctx.beginPath();ctx.moveTo(c*cw,startY);ctx.lineTo(c*cw,startY+nRows*rh);ctx.stroke();
    }

    // 標題列背景
    ctx.fillStyle='rgba(74,144,217,0.15)';
    ctx.fillRect(0,startY,W,rh);
    // 合計列背景
    ctx.fillStyle='rgba(212,168,67,0.08)';
    ctx.fillRect(0,startY+(nRows-1)*rh,W,rh);
    // 合計欄背景
    ctx.fillStyle='rgba(212,168,67,0.06)';
    ctx.fillRect((nCols-1)*cw,startY,cw,nRows*rh);

    const cellText=(txt,col,row,style,color)=>{
      ctx.fillStyle=color||TC;
      // style: 'header'=小標題, 'data'=大數字, 'total'=中等粗體, 'label'=列標籤
      const sizes={header:9,data:15,total:13,label:11};
      const bold=(style!=='header'&&style!=='data')?'bold ':style==='data'?'bold ':'';
      ctx.font=bold+f(sizes[style]||10);
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(txt,col*cw+cw/2,startY+row*rh+rh/2);
    };

    // 標題列
    cellText('',0,0,'header','#4a90d9');
    cols.forEach((c,i)=>cellText(c,i+1,0,'header','#4a90d9'));
    cellText('合計',nCols-1,0,'header','#d4a843');

    // 資料列（數字用大字體，讓學生難以用心算加總）
    rows.forEach((r,ri)=>{
      cellText(r,0,ri+1,'label','rgba(212,168,67,0.9)');
      cells[ri].forEach((v,ci)=>cellText(v,ci+1,ri+1,'data',TC));
      cellText(rowTotals[ri],nCols-1,ri+1,'total','rgba(212,168,67,0.9)');
    });

    // 合計列
    cellText('合計',0,nRows-1,'label','rgba(212,168,67,0.9)');
    colTotals.forEach((v,ci)=>cellText(v,ci+1,nRows-1,'total','rgba(212,168,67,0.8)'));
    cellText(grandTotal,nCols-1,nRows-1,'total','#f0c560');

    // 無綠框標示

  }else if(q.type==='mode'){
    // ── 眾數分析：橫向長條圖，突出顯示眾數 ──────────────────
    const{items,counts,pcts,mode}=q.data;
    const maxC=Math.max(...counts);
    const pad={t:16,r:80,b:16,l:10};
    const barH=Math.floor((H-pad.t-pad.b)/items.length)-8;
    const gap=(H-pad.t-pad.b)/items.length;

    items.forEach((item,i)=>{
      const isMode=(item===mode);
      const bw=(counts[i]/maxC)*(W-pad.l-pad.r-60);
      const by=pad.t+i*gap+(gap-barH)/2;

      // 長條
      ctx.fillStyle=isMode?'rgba(212,168,67,0.85)':COLORS[i+1]+'99';
      ctx.beginPath();
      ctx.moveTo(pad.l+2,by);ctx.lineTo(pad.l+bw-2,by);
      ctx.quadraticCurveTo(pad.l+bw,by,pad.l+bw,by+2);
      ctx.lineTo(pad.l+bw,by+barH-2);
      ctx.quadraticCurveTo(pad.l+bw,by+barH,pad.l+bw-2,by+barH);
      ctx.lineTo(pad.l+2,by+barH);
      ctx.quadraticCurveTo(pad.l,by+barH,pad.l,by+barH-2);
      ctx.lineTo(pad.l,by+2);
      ctx.quadraticCurveTo(pad.l,by,pad.l+2,by);
      ctx.fill();

      // 眾數特別標示
      if(isMode){
        ctx.strokeStyle='rgba(212,168,67,0.9)';ctx.lineWidth=1.5;
        ctx.strokeRect(pad.l-1,by-2,bw+2,barH+4);
        ctx.fillStyle='rgba(212,168,67,0.9)';ctx.font=`bold 10px 'Noto Sans TC'`;
        ctx.textAlign='left';ctx.textBaseline='middle';
        ctx.fillText('★ 眾數',pad.l+bw+6,by+barH/2);
      }

      // 品項名稱（左側，垂直置中）
      ctx.fillStyle=isMode?'#f0c560':TC;
      ctx.font=(isMode?'bold ':'')+f(10);
      ctx.textAlign='right';ctx.textBaseline='middle';
      // 縮短名稱顯示（去掉「便當」）
      const shortName=item.replace('便當','');
      ctx.fillText(shortName,W-8,by+barH/2);

      // 數量標籤
      ctx.fillStyle='rgba(220,215,208,0.85)';ctx.font=f(9);
      ctx.textAlign='left';
      ctx.fillText(counts[i]+'份',pad.l+bw+6+(isMode?40:0),by+barH/2);
    });

    // 標題
    ctx.fillStyle='rgba(175,170,163,0.5)';ctx.font=f(9);
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText('← 份數',pad.l,H-13);
  }
}

/* ══════════════════════════════════════════════════════════════════════
   第一關：選擇題 — 判斷統計圖表與統計量的「功用」
   共 6 題，每題 4 個選項（單選）
   時間：3 分鐘，答對 100 分 + 速度加分，無生命值
══════════════════════════════════════════════════════════════════════ */

const R1_QUESTIONS=[
  {id:'pie',question:'「圓餅圖」最適合用來表達什麼？',icon:'🥧',
   options:[
    {text:'顯示數量隨時間的變化趨勢',correct:false},
    {text:'比較各類別佔整體的比例（百分比）',correct:true},
    {text:'比較兩組不連續數據的大小',correct:false},
    {text:'顯示連續資料的分布範圍',correct:false},
   ],
   explanation:'圓餅圖用整圓切割成扇形，每個扇形代表一類別佔整體的比例，最適合看「各部分佔整體多少%」。'},
  {id:'bar',question:'「長條圖」最適合用來做什麼？',icon:'📊',
   options:[
    {text:'顯示資料的比例關係',correct:false},
    {text:'追蹤某個數值隨時間的上升或下降',correct:false},
    {text:'比較不同類別的數量大小',correct:true},
    {text:'描述連續數值的分布密度',correct:false},
   ],
   explanation:'長條圖每格代表一個獨立類別，長條高度直接反映數量，適合比較不同類別之間的數量差異。'},
  {id:'line',question:'「折線圖」最適合用來表達什麼？',icon:'📈',
   options:[
    {text:'比較多個不同類別的數量',correct:false},
    {text:'呈現數值隨時間的變化趨勢與增減速度',correct:true},
    {text:'顯示各類別佔整體的比例',correct:false},
    {text:'比較連續數值範圍內各組的人數',correct:false},
   ],
   explanation:'折線圖各時間點連成線，斜率代表增減速度，適合追蹤「某數值如何隨時間變化」。'},
  {id:'hist',question:'「直方圖」和「長條圖」最主要的差異是什麼？',icon:'📉',
   options:[
    {text:'直方圖有顏色，長條圖沒有',correct:false},
    {text:'直方圖的條形之間有間隔，長條圖沒有',correct:false},
    {text:'直方圖用於連續數值組距，長條圖用於不連續類別',correct:true},
    {text:'直方圖只能比較兩組資料',correct:false},
   ],
   explanation:'直方圖 X 軸是連續的數值範圍，條形緊鄰無間距，顯示連續資料分布。長條圖 X 軸是獨立類別，條形間有間距。'},
  {id:'mean_median',question:'資料中出現一個極端值，下列哪個說法正確？',icon:'📐',
   options:[
    {text:'平均數不受影響，可代表大多數人的水準',correct:false},
    {text:'中位數會被極端值大幅拉高',correct:false},
    {text:'平均數會被拉高，此時中位數更能代表多數人',correct:true},
    {text:'極端值不影響任何統計量',correct:false},
   ],
   explanation:'平均數是加總除以個數，極端值直接影響加總把平均數拉偏。中位數只看排序後的中間位置，不受極端值影響，因此更具代表性。'},
  {id:'mode',question:'「眾數」的定義是什麼？',icon:'🍱',
   options:[
    {text:'所有數值加總後除以個數的結果',correct:false},
    {text:'資料從小到大排列後，最中間的那個值',correct:false},
    {text:'資料中數值最大的那一個',correct:false},
    {text:'資料中出現次數最多的那個值，可以是數字或文字',correct:true},
   ],
   explanation:'眾數是出現「最多次」的值本身，和數值大小無關。可以是數字也可以是文字類別，例如訂購最多份的便當名稱就是眾數。'},
];

const LB_R1_KEY='detective_lb_r1_v1';
function loadLBR1(){try{return JSON.parse(localStorage.getItem(LB_R1_KEY))||[];}catch{return[];}}
function saveLBR1(lb){try{localStorage.setItem(LB_R1_KEY,JSON.stringify(lb));}catch{}}
function addToLBR1(name,score,correct){
  const lb=loadLBR1();
  lb.push({name,score,correct,total:R1_QUESTIONS.length,date:new Date().toLocaleDateString('zh-TW')});
  lb.sort((a,b)=>b.score-a.score);
  if(lb.length>20)lb.length=20;
  saveLBR1(lb);return lb;
}
function renderLBR1(cid,myScore){
  const lb=loadLBR1(),el=document.getElementById(cid);
  if(!el)return;
  if(!lb.length){el.innerHTML='<div class="lb-empty">尚無記錄，成為第一個答題的同學！</div>';return;}
  const medals=['🥇','🥈','🥉'],rc=['gold','silver','bronze'];
  el.innerHTML=lb.map((r,i)=>{
    const me=r.score===myScore&&i===lb.findIndex(x=>x.score===myScore);
    return`<div class="lb-row${me?' me':''}"><span class="lb-rank ${rc[i]||''}">${medals[i]||i+1}</span><span class="lb-name">${r.name}</span><span class="lb-score">${r.score}</span><span class="lb-meta">${r.correct}/${r.total}題・${r.date}</span></div>`;
  }).join('');
}

function renderQ(){
  if(G.qIdx>=G.qs.length){showResult();return;}
  G.answered=false;G.marks={};G.markScore=0;
  const q=G.qs[G.qIdx];
  const d=q.diff;

  const susLen=q.suspects.length;
  const order=Array.from({length:susLen},(_,i)=>i).sort(()=>Math.random()-.5);

  q._sus=sus;
  q._liarIdx=sus.findIndex(s=>s.liar);

  document.getElementById('b-type').textContent=q.typeLabel;

  wrap.innerHTML=`
    <div class="main">

        <div class="diff-tag diff-${d}">
          ${{easy:'⭐ 初級',med:'⭐⭐ 中級',hard:'⭐⭐⭐ 高難'}[d]}
          &nbsp;·&nbsp; 題目 ${G.qIdx+1} / ${G.qs.length}

      </div>
      <div class="panel">
        <div class="ptitle"><span class="ptitle-dot"></span>嫌疑人審問</div>
        <div style="font-size:11px;color:var(--text3);margin-bottom:10px;line-height:1.6">
          點擊每條證詞標記
          <span style="color:var(--green)">✅ 可信</span> 或
          <span style="color:var(--red)">🔴 可疑</span>，
          <strong style="color:var(--text2)">全部標記後</strong>才能指控。
        </div>
        <div class="suspects" id="sus-list"></div>
        <div class="accuse-section">
          <div class="accuse-lbl" id="acc-lbl" style="color:var(--text3)">▸ 請先標記所有證詞</div>

        </div>
        <div class="fb" id="fb"></div>

  area.innerHTML='';area.appendChild(wrap);

  // Canvas
  setTimeout(()=>{
    const cv=document.getElementById('cv');
