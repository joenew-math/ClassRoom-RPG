      const dc=document.getElementById('dc');
      q.data.data.forEach(v=>{
        const c=document.createElement('span');
        c.className='dchip'+(v===q.data.outlier?' out':'');
        c.textContent=v;dc.appendChild(c);
      });
    }
  },50);

  // Suspect cards — sentences shuffled per person, NO score hints during marking
  const list=document.getElementById('sus-list');
  sus.forEach((s,si)=>{
    G.marks[si]={};
    const card=document.createElement('div');
    card.className='suspect';
    const rawSents=(s.text.match(/[^。！？]+[。！？]?/g)||[s.text]).filter(x=>x.trim());
    const sentOrder=Array.from({length:rawSents.length},(_,i)=>i).sort(()=>Math.random()-.5);
    const sents=sentOrder.map(i=>rawSents[i]);
    card.innerHTML=`
      <div class="s-hd">
        <div class="avatar av${si}">${s.name[0]}</div>
        <div><div class="s-name">${s.name}</div><div class="s-role">${s.role}</div></div>
      </div>
      <div id="tl-${si}"></div>`;
    const tlWrap=card.querySelector(`#tl-${si}`);
    sents.forEach((sent,li)=>{
      const line=document.createElement('div');
      line.className='tline';
      line.innerHTML=`<span class="tline-txt">「${sent.trim()}」</span><span class="tmark" id="tm-${si}-${li}">?</span>`;
      line.addEventListener('click',()=>{
        if(G.answered)return;
        const cur=G.marks[si][li];
        const nxt=cur==='ok'?'sus':cur==='sus'?undefined:'ok';
        G.marks[si][li]=nxt;
        line.className='tline'+(nxt==='ok'?' ok':nxt==='sus'?' sus':'');
        document.getElementById(`tm-${si}-${li}`).textContent=nxt==='ok'?'✅':nxt==='sus'?'🔴':'?';
        checkAllMarked(sus);
      });
      tlWrap.appendChild(line);
    });
    list.appendChild(card);
  });

  // Accuse buttons (disabled initially)
  buildAccuse(q,sus);

  // Start global timer only on Q0
  if(G.qIdx===0){
    startTimer(()=>{if(!G.answered)resolveAnswer(null,q,sus);});
  }

  document.getElementById('nxt').addEventListener('click',()=>{G.qIdx++;renderQ();});
}

function checkAllMarked(sus){
  let allDone=true;
  for(let si=0;si<sus.length;si++){
    const sents=(sus[si].text.match(/[^。！？]+[。！？]?/g)||[sus[si].text]).filter(x=>x.trim());
    for(let li=0;li<sents.length;li++){
      if(G.marks[si][li]===undefined){allDone=false;break;}
    }
    if(!allDone)break;
  }
  const btns=document.querySelectorAll('.accuse-btn');
  const lbl=document.getElementById('acc-lbl');
  btns.forEach((b,si)=>{
    b.disabled=!allDone;
    b.style.opacity=allDone?'1':'0.35';
    if(allDone){
      const hasSus=Object.values(G.marks[si]||{}).includes('sus');
      b.style.borderColor=hasSus?'rgba(217,80,80,.5)':'';
      b.style.color=hasSus?'#e87070':'';
    }else{b.style.borderColor='';b.style.color='';}
  });
  if(lbl){
    lbl.textContent=allDone?'▸ 你認為說謊的是？':'▸ 請先標記所有證詞';
    lbl.style.color=allDone?'var(--amber)':'var(--text3)';
  }
}

function buildAccuse(q,sus){
  const c=document.getElementById('acc-btns');c.innerHTML='';
  sus.forEach((s,si)=>{
    const btn=document.createElement('button');
    btn.className='accuse-btn';btn.disabled=true;btn.style.opacity='0.35';
    btn.innerHTML=`<span class="avatar av${si}" style="width:22px;height:22px;font-size:10px">${s.name[0]}</span>${s.name}`;
    btn.addEventListener('click',()=>{if(!G.answered)resolveAnswer(si,q,sus);});
    c.appendChild(btn);
  });
}

function resolveAnswer(chosen,q,sus){
  G.answered=true;
  const liarIdx=q._liarIdx;
  const correct=chosen===liarIdx;
  const timePct=G.timeLeft/GLOBAL_TIME;
  const basePt=PTS[G.qIdx]||100;
  const timeBonus=correct?Math.floor(timePct*basePt*.5):0;
  const streakBonus=correct&&G.streak>=2?50:0;

  // Calculate mark score AFTER answer (hidden until now)
  let markPts=0;
  sus.forEach((s,si)=>{
    const isLiar=s.liar===true;
    const correctMark=isLiar?'sus':'ok';
    Object.values(G.marks[si]||{}).forEach(v=>{if(v===correctMark)markPts+=MARK_PTS;});
  });
  G.markScore+=markPts;

  if(correct){G.streak++;G.score+=basePt+timeBonus+streakBonus+markPts;}
  else{G.streak=0;G.hp--;if(G.hp<0)G.hp=0;G.score+=markPts;}

  document.querySelectorAll('.tline').forEach(l=>l.classList.add('locked'));
  document.querySelectorAll('.accuse-btn').forEach((b,i)=>{
    b.disabled=true;b.style.opacity='1';
    b.classList.add(i===liarIdx?'liar-reveal':'truth-reveal');
  });
  if(!correct){
    const bar=document.getElementById('hp-bar');
    bar.classList.add('shake');setTimeout(()=>bar.classList.remove('shake'),400);
  }

  // Reveal all correct marks + floating score pops
  const cards=document.querySelectorAll('.suspect');
  sus.forEach((s,si)=>{
    const isLiar=s.liar===true;
    const correctMark=isLiar?'sus':'ok';
    if(cards[si]){
      cards[si].querySelectorAll('.tline').forEach((l,li)=>{
        const cur=G.marks[si]&&G.marks[si][li];
        const wasCorrect=(cur===correctMark);
        if(isLiar){
          l.className='tline sus locked';
          const tm=l.querySelector('.tmark');if(tm)tm.textContent='🔴';
        } else {
          l.className='tline ok locked';
          const tm=l.querySelector('.tmark');if(tm)tm.textContent='✅';
        }
        // Show +10 pop only for lines that were correctly marked
        if(wasCorrect){
          const pop=document.createElement('span');
          pop.className='score-pop plus';pop.textContent='+'+MARK_PTS;
          l.style.position='relative';l.appendChild(pop);
          setTimeout(()=>pop.remove(),950);
        }
      });
    }
  });

  const fb=document.getElementById('fb');
  fb.className='fb show '+(correct?'ok':'fail');
  let msg=correct
    ?`✓ 正確指控！${sus[liarIdx].name} 就是說謊者。`
    :(chosen===null?`⏰ 時間到！真正的說謊者是 ${sus[liarIdx].name}。`
                   :`✗ 指控錯誤。真正的說謊者是 ${sus[liarIdx].name}。`);
  msg+=`<br><span style="color:var(--text2)">${q.explanation}</span>`;
  const bonuses=[];
  if(correct) bonuses.push(`🎯 指控 +${basePt}`);
  if(timeBonus>0) bonuses.push(`⚡ 速度 +${timeBonus}`);
  if(streakBonus>0) bonuses.push(`🔥 連勝 +${streakBonus}`);
  if(markPts>0) bonuses.push(`🔍 標記 +${markPts}`);
  if(bonuses.length)msg+=`<br><span style="color:var(--amber);font-size:12px">${bonuses.join('　')}</span>`;
  fb.innerHTML=msg;
  if(correct&&G.streak>=3)showToast(`🔥 ${G.streak}連勝！`);
  renderHUD();renderDots();
  if(G.hp<=0){document.getElementById('nxt').style.display='none';stopTimer();setTimeout(()=>showEndScreen(false),1200);}
  else document.getElementById('nxt').classList.add('show');
}

}

function confirmName(){
  const inp=document.getElementById('player-name');
  const name=(inp&&inp.value.trim())||'匿名偵探';
  // store name globally so all rounds can access it
  if(!window._playerName) window._playerName=name;
  window._playerName=name;
  G={playerName:name};G1={playerName:name};G2={playerName:name};
  startR1();
}

function showEndScreen(completed){
  stopTimer();
  const lb=addToLB(G.playerName||window._playerName||'匿名偵探', G.score, G.hp, completed);
  const myRank=lb.findIndex(r=>r.score===G.score)+1;
  const perfect=G.hp===3&&completed;
  const area=document.getElementById('game-area');
  area.innerHTML=`
    <div class="screen">
      <div class="screen-icon">${completed?(perfect?'🏆':'🔍'):'💀'}</div>
      <div class="screen-title">${completed?(perfect?'完美破案！':'偵探任務完成'):'偵探倒下了'}</div>
      <div class="screen-sub">${completed
        ?(perfect?'全程零失誤，真相大白！':'9 道案件全部偵破！')
        :'生命歸零，繼續加油！'}</div>
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-v">${G.score}</div><div class="stat-l">第三關得分</div></div>
        <div class="stat-card"><div class="stat-v">${completed?'9/9':G.qIdx+'/9'}</div><div class="stat-l">完成題數</div></div>
        <div class="stat-card"><div class="stat-v">${G.hp}</div><div class="stat-l">剩餘生命</div></div>
        <div class="stat-card"><div class="stat-v">${(G1&&G1.score||0)+(G2&&G2.score||0)+G.score}</div><div class="stat-l">三關總分</div></div>
      </div>
      <div class="lb-wrap" style="margin-bottom:20px">
        <div class="lb-tabs">
          <button class="lb-tab" onclick="switchLBTab3('r1',this,'lb-end')">🌟 第一關</button>
          <button class="lb-tab" onclick="switchLBTab3('r2',this,'lb-end')">🧮 第二關</button>
          <button class="lb-tab active" onclick="switchLBTab3('r3',this,'lb-end')">🔍 第三關</button>
        </div>
        <div id="lb-end"></div>
      </div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="cta" onclick="startGame()">重玩第三關</button>
        <button class="cta" style="background:transparent;border-color:var(--border2);color:var(--text2)" onclick="showNameEntry()">回首頁</button>
      </div>
    </div>`;
  renderLB('lb-end',G.score);
}

function showGameOver(){ showEndScreen(false); }
function showResult(){ showEndScreen(true); }

/* ══════ START R2 (偵探關) ══════ */
function startGame(){
  clearInterval(G&&G.timerID);
  const name=G&&G.playerName||G1&&G1.playerName||G2&&G2.playerName||window._playerName||'匿名偵探';
  G={qIdx:0,hp:3,score:0,streak:0,timeLeft:GLOBAL_TIME,timerID:null,answered:false,marks:{},qs:makeQuestions(),markScore:0,totalMarks:0,playerName:name};
  document.getElementById('b-stage').textContent='第三關';
  renderHUD();renderDots();renderQ();
}
showNameEntry();
</script>
</body>
</html>
